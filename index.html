<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Füchse Berlin – Verfügbarkeit</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --red:#c0392b;--red-light:#e74c3c;
  --green:#2d6a4f;--green-light:#40916c;--green-pale:#e8f5ee;
  --white:#f0f7f2;--dark:#1e2d24;--mid:#263b2e;--muted:#7a9e88;
  --line:#2e4a38;--warn:#f4a261;--court:#52b788;
  --card:#243330;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--white);min-height:100vh}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--dark)}
::-webkit-scrollbar-thumb{background:var(--green);border-radius:3px}

header{
  background:linear-gradient(160deg,#1b2d23 0%,#2d4a38 60%,#1e2d24 100%);
  padding:20px 24px 18px;border-bottom:3px solid var(--red);
  display:flex;align-items:center;gap:16px;
}
.logo-img{width:54px;height:54px;object-fit:contain;flex-shrink:0}
.header-text h1{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--white)}
.header-text p{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px}

.lang-bar{display:flex;gap:5px;margin-left:auto}
.lang-btn{padding:4px 10px;font-size:11px;font-weight:600;border:1px solid var(--line);border-radius:6px;cursor:pointer;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .15s}
.lang-btn.active{background:var(--green-light);color:#fff;border-color:var(--green-light)}

main{padding:20px;max-width:480px;margin:0 auto}

.step{display:none}.step.active{display:block}

.step-label{font-size:11px;font-weight:600;color:var(--court);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.step-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:var(--white);margin-bottom:4px}
.step-sub{font-size:13px;color:var(--muted);margin-bottom:20px}

.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:12px}

input,select{background:#1b2d24;border:1px solid var(--line);border-radius:8px;color:var(--white);padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;width:100%;transition:border-color .2s}
input:focus,select:focus{border-color:var(--court)}
input::placeholder{color:var(--muted)}

.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;background:#243330;border:1px solid #3a5a48;border-radius:10px;z-index:50;max-height:240px;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,.35);margin-top:4px}
.ac-item{padding:11px 14px;font-size:14px;cursor:pointer;color:var(--white);display:flex;align-items:center;gap:10px;border-bottom:1px solid #2e4a3855}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:#2e4a38}
.ac-meta{font-size:11px;color:var(--muted);margin-left:auto}
.avatar{width:34px;height:34px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--court);flex-shrink:0}

.btn{display:block;width:100%;padding:13px 20px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center;margin-bottom:10px}
.btn-primary{background:var(--green-light);color:#fff}
.btn-primary:hover{background:var(--court);color:var(--dark)}
.btn-outline{background:transparent;border:1px solid var(--line);color:var(--muted)}
.btn-outline:hover{border-color:var(--court);color:var(--court)}
.btn-sm{width:auto;display:inline-block;padding:7px 16px;font-size:13px;margin:0}

.match-item{background:#1b2d24;border:1px solid var(--line);border-radius:10px;padding:13px 15px;margin-bottom:9px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px}
.match-item:hover{border-color:var(--court)99;background:#243330;transform:translateY(-1px)}
.match-date{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--court);line-height:1;min-width:40px;text-align:center}
.match-month{font-size:10px;color:var(--muted);text-align:center;text-transform:uppercase;letter-spacing:.5px}
.match-info{flex:1}
.match-teams{font-weight:600;font-size:14px;color:var(--white)}
.match-meta{font-size:11px;color:var(--muted);margin-top:2px}
.match-avail{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.av-yes{background:#1a3d2a;color:var(--court);border:1px solid var(--court)55}
.av-no{background:#3d1a1a;color:#e74c3c;border:1px solid #e74c3c44}
.av-maybe{background:#2d2215;color:var(--warn);border:1px solid var(--warn)44}
.av-open{background:#2e4a3844;color:var(--muted);border:1px solid var(--line)}

.avail-btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.avail-btn{flex:1;min-width:80px;padding:14px 8px;border-radius:10px;border:1.5px solid transparent;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center}
.avail-btn.yes{background:#1a3d2a55;color:var(--court);border-color:var(--court)44}
.avail-btn.yes.on{background:#1a3d2a;color:var(--court);border-color:var(--court);transform:scale(1.04)}
.avail-btn.maybe{background:#2d221555;color:var(--warn);border-color:var(--warn)44}
.avail-btn.maybe.on{background:#2d2215;color:var(--warn);border-color:var(--warn);transform:scale(1.04)}
.avail-btn.no{background:#3d1a1a55;color:#e74c3c;border-color:#e74c3c44}
.avail-btn.no.on{background:#3d1a1a;color:#e74c3c;border-color:#e74c3c;transform:scale(1.04)}

.saved-msg{font-size:13px;color:var(--court);min-height:20px;margin-top:12px;text-align:center;font-weight:500}

.player-card{display:flex;align-items:center;gap:12px;background:#1b2d24;border:1px solid var(--line);border-radius:10px;padding:13px 15px;margin-bottom:14px}
.player-card .avatar{width:44px;height:44px;font-size:15px}
.lk-badge{background:#1b2d24;border:1px solid var(--court)55;color:var(--court);font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--court);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

.empty{text-align:center;padding:3rem 20px;color:var(--muted);font-size:14px}
.blocked-warn{background:#3d1a1a;border:1px solid #e74c3c44;border-radius:10px;padding:12px 14px;margin-bottom:12px;font-size:13px;color:#e74c3c}

.back-row{display:flex;align-items:center;gap:8px;margin-bottom:18px}
.back-btn{background:none;border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:6px 14px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s}
.back-btn:hover{border-color:var(--court);color:var(--court)}

@media(max-width:400px){.avail-btn{font-size:13px;padding:10px 6px}}
</style>
</head>
<body>
<div id="sp-login" style="position:fixed;inset:0;background:#0d2015;display:flex;align-items:center;justify-content:center;z-index:9999;font-family:'DM Sans',sans-serif;">
  <div style="background:#1a2e24;border:1px solid #2d6a4f;border-radius:14px;padding:36px 32px;width:100%;max-width:320px;box-shadow:0 20px 60px rgba(0,0,0,.6);">
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.1em;color:#74c69d">FÜCHSE BERLIN</div>
      <div style="font-size:.7rem;color:#4a9970;letter-spacing:.08em;text-transform:uppercase;margin-top:3px">Spieler-App</div>
    </div>
    <div style="margin-bottom:20px">
      <label style="font-size:.7rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#4a9970;display:block;margin-bottom:5px">Passwort</label>
      <input id="sp-pw" type="password" autocomplete="current-password"
        style="width:100%;background:#111;border:1px solid #2d6a4f;border-radius:8px;color:#f0f0f0;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none"
        placeholder="••••••••" onkeydown="if(event.key==='Enter')spLogin()">
    </div>
    <button onclick="spLogin()" style="width:100%;padding:11px;border-radius:8px;border:none;background:#2d6a4f;color:#fff;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer">Einloggen</button>
    <div id="sp-err" style="margin-top:12px;font-size:.8rem;color:#e63946;text-align:center;min-height:18px"></div>
  </div>
</div>
<script>
(function(){
  const PW='schlauerfuchs';const KEY='fcb_spieler_auth';
  if(sessionStorage.getItem(KEY)==='ok'){document.getElementById('sp-login').style.display='none';}
  window.spLogin=function(){
    const pw=document.getElementById('sp-pw').value;
    if(pw===PW){
      sessionStorage.setItem(KEY,'ok');
      const o=document.getElementById('sp-login');
      o.style.opacity='0';o.style.transition='opacity .3s';
      setTimeout(()=>o.style.display='none',300);
    }else{
      document.getElementById('sp-err').textContent='Falsches Passwort';
      document.getElementById('sp-pw').value='';
      setTimeout(()=>document.getElementById('sp-err').textContent='',2000);
    }
  };
})();
</script>

}

function applyT(){
  document.getElementById('header-sub').textContent=tr('headerSub');
  document.getElementById('lbl-step1').textContent=tr('step1Label');
  document.getElementById('ttl-step1').textContent=tr('step1Title');
  document.getElementById('sub-step1').textContent=tr('step1Sub');
  document.getElementById('ac-input').placeholder=tr('step1Ph');
  document.getElementById('lbl-step2').textContent=tr('step2Label');
  document.getElementById('sub-step2').textContent=tr('step2Sub');
  document.getElementById('sub-step3').textContent=tr('step3Sub');
  document.getElementById('btn-yes').textContent=tr('yesBtn');
  document.getElementById('btn-maybe').textContent=tr('maybeBtn');
  document.getElementById('btn-no').textContent=tr('noBtn');
  document.getElementById('btn-back-matches').textContent=tr('backMatches');
}

function initials(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
function fmtDate(d){
  if(!d)return'';
  const[y,m,day]=d.split('-');
  const months=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  return{day,month:months[parseInt(m)-1],full:`${day}.${m}.${y}`};
}
function teamById(id){return state.teams.find(t=>t.id===id)}
function playerById(id){return state.players.find(p=>p.id===id)}
function getPlayerTeamIds(playerId){return state.playerTeams.filter(r=>r.player_id===playerId).map(r=>r.team_id);}
function teamSize(t){return t&&t.season==='Winter'?4:6}
function teamNumber(team){
  if(team.team_number)return parseInt(team.team_number);
  const roman={I:1,II:2,III:3,IV:4,V:5,VI:6,VII:7,VIII:8};
  const r=team.name.match(/\b(VIII|VII|VI|IV|V|III|II|I)\b/);if(r)return roman[r[1]]||1;
  const n=team.name.match(/(\d+)$/);return n?parseInt(n[1]):1;
}

// ── BLOCKING LOGIC ──
// Same dual-rule system as admin:
// Rule 1 – Stammkader: LK position within category → locked to team, blocked in higher-numbered teams
// Rule 2 – Stammmannschaft: 2+ matches in team → blocked in all higher-numbered teams in same category
function isBlocked(playerId,teamId){
  const team=teamById(teamId);if(!team)return false;
  const cat=team.category||'Herren';
  const catTeams=state.teams.filter(t=>t.category===cat).sort((a,b)=>teamNumber(a)-teamNumber(b));
  const counts=state.matchCounts[playerId]||{};
  const thisNum=teamNumber(team);
  // Rule 2: Stammmannschaft
  for(const t of catTeams){const c=counts[t.id]||0;if(c>=2&&teamNumber(t)<thisNum)return true;}
  // Rule 1: Stammkader
  const catPlayers=state.players.filter(p=>{const tids=getPlayerTeamIds(p.id);return tids.some(tid=>catTeams.find(t=>t.id===tid));}).sort((a,b)=>a.lk-b.lk);
  const posInCat=catPlayers.findIndex(p=>p.id===playerId);
  if(posInCat<0)return false;
  const groupSize=teamSize(catTeams[0]||team);
  const stammTeamIdx=Math.floor(posInCat/groupSize);
  const stammTeam=catTeams[stammTeamIdx]||catTeams[catTeams.length-1];
  if(stammTeam&&teamNumber(stammTeam)<thisNum)return true;
  return false;
}

async function loadAll(){
  document.getElementById('find-status').textContent=tr('findStatus');
  try{
    const[teams,players,matches,avRows,countRows,ptRows]=await Promise.all([
      sbGet('teams','order=category,team_number'),
      sbGet('players','order=lk'),
      sbGet('matches','order=date'),
      sbGet('availability',''),
      sbGet('player_match_counts',''),
      sbGet('player_teams','')
    ]);
    state.teams=teams;
    state.players=players.map(p=>({...p,lkStr:p.lk_str,rawName:p.raw_name,year:p.year}));
    state.matches=matches.map(m=>({...m,teamId:m.team_id}));
    state.availability={};
    for(const r of avRows){if(!state.availability[r.match_id])state.availability[r.match_id]={};state.availability[r.match_id][r.player_id]=r.status;}
    state.matchCounts={};
    for(const r of countRows){if(!state.matchCounts[r.player_id])state.matchCounts[r.player_id]={};state.matchCounts[r.player_id][r.team_id]=r.matches_played;}
    state.playerTeams=ptRows;
    document.getElementById('find-status').textContent='';
  }catch(e){document.getElementById('find-status').textContent='Verbindungsfehler. Bitte Seite neu laden.';console.error(e);}
}

function onAcInput(){
  const val=document.getElementById('ac-input').value.toLowerCase();
  const list=document.getElementById('ac-list');
  if(!val||val.length<2){list.style.display='none';return;}
  const filtered=state.players.filter(p=>p.name.toLowerCase().includes(val)||(p.raw_name||p.rawName||'').toLowerCase().includes(val)).slice(0,10);
  if(!filtered.length){list.style.display='none';return;}
  list.innerHTML=filtered.map(p=>`<div class="ac-item" onclick="selectPlayer('${p.id}')">
    <div class="avatar">${initials(p.name)}</div>
    <div style="flex:1"><div style="font-weight:600">${p.name}</div><div style="font-size:11px;color:var(--muted)">${p.year||''}</div></div>
    <span class="lk-badge">${p.lk_str||p.lkStr||'?'}</span>
  </div>`).join('');
  list.style.display='block';
}

document.addEventListener('click',e=>{if(!e.target.closest('.ac-wrap'))document.getElementById('ac-list').style.display='none';});

function selectPlayer(id){
  selectedPlayer=state.players.find(p=>p.id===id);
  document.getElementById('ac-input').value=selectedPlayer.name;
  document.getElementById('ac-list').style.display='none';
  goMatches();
}

function showStep(name){
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.getElementById('step-'+name).classList.add('active');
  window.scrollTo(0,0);
}

function goFind(){selectedPlayer=null;showStep('find');}
function goMatches(){if(!selectedPlayer)return showStep('find');renderMatchList();showStep('matches');}

function renderMatchList(){
  const p=selectedPlayer;
  const teamIds=getPlayerTeamIds(p.id);
  document.getElementById('selected-player-name').textContent=p.name;
  const teams=teamIds.map(tid=>teamById(tid)).filter(Boolean);
  document.getElementById('player-info-card').innerHTML=`<div class="player-card">
    <div class="avatar" style="width:44px;height:44px;font-size:15px">${initials(p.name)}</div>
    <div>
      <div style="font-size:13px;color:var(--muted)">${p.lk_str||p.lkStr||''} · Jg. ${p.year||'—'}</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:4px">${teams.map(t=>`<span style="font-size:11px;background:#2a1010;border:1px solid var(--red)33;color:var(--red);padding:2px 8px;border-radius:10px">${t.name}</span>`).join('')}</div>
    </div>
  </div>`;
  const myMatches=[...state.matches].filter(m=>teamIds.includes(m.team_id)).sort((a,b)=>a.date.localeCompare(b.date));
  const el=document.getElementById('match-list');
  if(!myMatches.length){el.innerHTML=`<div class="empty">${tr('noMatches')}</div>`;return;}
  el.innerHTML=myMatches.map(m=>{
    const team=teamById(m.team_id);
    const avail=state.availability[m.id]?.[p.id]||'';
    const d=fmtDate(m.date);
    const blocked=isBlocked(p.id,m.team_id);
    let avBadge='';
    if(avail==='yes')avBadge=`<span class="match-avail av-yes">${tr('yesBtn')}</span>`;
    else if(avail==='no')avBadge=`<span class="match-avail av-no">${tr('noBtn')}</span>`;
    else if(avail==='maybe')avBadge=`<span class="match-avail av-maybe">${tr('maybeBtn')}</span>`;
    else avBadge=`<span class="match-avail av-open">?</span>`;
    return`<div class="match-item" onclick="selectMatch('${m.id}')">
      <div style="text-align:center;min-width:40px">
        <div class="match-date">${d.day}</div>
        <div class="match-month">${d.month}</div>
      </div>
      <div class="match-info">
        <div class="match-teams">${team?.name||'?'} vs ${m.opponent}</div>
        <div class="match-meta">${m.time} · ${m.home}${blocked?' · ⛔':''}</div>
      </div>
      ${avBadge}
    </div>`;
  }).join('');
}

function selectMatch(id){
  selectedMatch=state.matches.find(m=>m.id===id);
  if(!selectedMatch)return;
  renderConfirm();showStep('confirm');
}

function renderConfirm(){
  const m=selectedMatch;const p=selectedPlayer;
  const team=teamById(m.team_id);
  const d=fmtDate(m.date);
  const blocked=isBlocked(p.id,m.team_id);
  const avail=state.availability[m.id]?.[p.id]||'';
  document.getElementById('confirm-match-name').textContent=`${team?.name||'?'} vs ${m.opponent}`;
  document.getElementById('confirm-match-meta').textContent=`${d.full} · ${m.time} · ${m.home}`;
  document.getElementById('confirm-player-card').innerHTML=`<div class="player-card">
    <div class="avatar">${initials(p.name)}</div>
    <div><div style="font-weight:600">${p.name}</div><div style="font-size:12px;color:var(--muted)">${p.lk_str||p.lkStr||''} · Jg. ${p.year||'—'}</div></div>
  </div>`;
  document.getElementById('confirm-blocked').innerHTML=blocked?`<div class="blocked-warn">${tr('blockedWarn')}</div>`:'';
  ['yes','maybe','no'].forEach(s=>{document.getElementById('btn-'+s).classList.toggle('on',avail===s);});
  document.getElementById('saved-msg').textContent=avail?tr('saved'):'';
}

async function setAvail(status){
  if(!selectedMatch||!selectedPlayer)return;
  const matchId=selectedMatch.id,playerId=selectedPlayer.id;
  document.getElementById('saved-msg').innerHTML=`<span class="spinner"></span>${tr('saving')}`;
  if(!state.availability[matchId])state.availability[matchId]={};
  state.availability[matchId][playerId]=status;
  try{
    await sbUpsert('availability',[{match_id:matchId,player_id:playerId,status}]);
    ['yes','maybe','no'].forEach(s=>document.getElementById('btn-'+s).classList.toggle('on',s===status));
    document.getElementById('saved-msg').textContent=tr('saved');
    setTimeout(()=>{if(selectedPlayer)renderMatchList();},300);
  }catch(e){document.getElementById('saved-msg').textContent='Fehler. Bitte erneut versuchen.';console.error(e);}
}

setLang('de');
applyT();
loadAll();
</script>
