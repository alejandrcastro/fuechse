<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Club Manager – TVBB Berlin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{
  --green:#2d6a4f;--green-light:#40916c;--court:#74c69d;
  --white:#f0f2f1;--dark:#161616;--card:#1e1e1e;--muted:#7a8a85;
  --warn:#f4a261;--danger:#c0392b;--info:#4ea8de;--red:#c0392b;
  --border:#252525;--border2:#333
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--white);min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--dark)}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--green)}

header{background:#111;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px}
.logo{display:flex;align-items:center;gap:10px}
.logo-img{width:36px;height:36px;object-fit:contain;flex-shrink:0}
.logo h1{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px}
.logo span{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;display:block}
.header-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tvbb-badge{background:#1a2e26;border:1px solid var(--court)44;color:var(--court);font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:1px}
.sync-badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;transition:all .3s}
.sync-ok{background:#1a2a1a;border:1px solid var(--court)55;color:var(--court)}
.sync-err{background:#3d1a1a;border:1px solid var(--danger)55;color:var(--danger)}
.sync-ing{background:#2e2a1a;border:1px solid var(--warn)55;color:var(--warn)}
.lang-bar{display:flex;gap:4px}
.lang-btn{padding:3px 8px;font-size:11px;font-weight:600;border:1px solid var(--border2);border-radius:6px;cursor:pointer;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .15s}
.lang-btn:hover{color:var(--white)}
.lang-btn.active{background:var(--green-light);color:#fff;border-color:var(--green-light)}
.tabs{display:flex;padding:0 28px;background:#111;border-bottom:1px solid var(--border2);overflow-x:auto}
.tab{padding:11px 18px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif}
.tab:hover{color:var(--white)}
.tab.active{color:var(--court);border-bottom-color:var(--court)}
main{padding:22px 28px;max-width:1080px;margin:0 auto}
.section{display:none}.section.active{display:block}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--court);margin-bottom:3px}
.section-sub{color:var(--muted);font-size:12px;margin-bottom:18px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:15px 19px;margin-bottom:11px}
.card-title{font-weight:600;font-size:13px;color:var(--white);margin-bottom:9px}
.form-row{display:flex;gap:9px;margin-bottom:9px;flex-wrap:wrap}
.form-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:120px}
label{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.5px;text-transform:uppercase}
input,select{background:#111;border:1px solid var(--border2);border-radius:8px;color:var(--white);padding:7px 10px;font-family:'DM Sans',sans-serif;font-size:13px;transition:border-color .2s;outline:none;width:100%}
input:focus,select:focus{border-color:var(--court)}
select option{background:#1b2926}
.btn{padding:7px 15px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--red);color:#fff}
.btn-primary:hover{background:var(--court);color:#fff}
.btn-danger{background:transparent;border:1px solid var(--danger);color:var(--danger);font-size:11px;padding:3px 7px}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-outline{background:transparent;border:1px solid var(--green-light);color:var(--court)}
.btn-outline:hover{background:var(--green-light);color:#fff}
.btn-warn{background:var(--warn);color:var(--dark);border:none}
.player-row{display:flex;align-items:center;gap:9px;background:#181818;border:1px solid var(--border);border-radius:10px;padding:8px 12px;margin-bottom:6px;transition:border-color .2s;flex-wrap:wrap}
.player-row:hover{border-color:var(--court)55}
.player-avatar{width:30px;height:30px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--court);flex-shrink:0}
.player-name{font-weight:600;font-size:13px;flex:1;min-width:120px}
.player-meta{font-size:11px;color:var(--muted)}
.lk-badge{background:#1a2e26;color:var(--court);border:1px solid var(--court)33;font-size:11px;font-weight:700;padding:2px 6px;border-radius:6px;min-width:46px;text-align:center;white-space:nowrap}
.year-badge{background:#181818;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:2px 6px;border-radius:6px;white-space:nowrap}
.team-chip{font-size:10px;font-weight:600;padding:2px 7px;border-radius:12px;background:#2e4a42;color:var(--muted);white-space:nowrap}
.team-chip.m{background:#1a2d3d;color:var(--info)}
.team-chip.f{background:#2d1a2d;color:#c77dff}
.blocked-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:12px;background:#3d1a1a;color:var(--danger);border:1px solid var(--danger)44;white-space:nowrap}
.warn-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:12px;background:#2d2215;color:var(--warn);border:1px solid var(--warn)44;white-space:nowrap}
.match-card{background:#181818;border:1px solid var(--border);border-radius:12px;padding:13px 15px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.match-card:hover{border-color:var(--court)77;transform:translateY(-1px)}
.match-teams{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px}
.match-vs{color:var(--court);margin:0 5px}
.match-info{font-size:11px;color:var(--muted);margin-top:2px}
.match-status{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase}
.status-open{background:var(--warn)33;color:var(--warn);border:1px solid var(--warn)55}
.status-ready{background:#2d6a4f44;color:var(--court);border:1px solid var(--court)44}
.avail-table{width:100%;border-collapse:collapse}
.avail-table th{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:6px 10px;text-align:left;border-bottom:1px solid #2e4a42}
.avail-table td{padding:7px 10px;border-bottom:1px solid #1b292611;font-size:12px;vertical-align:middle}
.avail-table tr:last-child td{border-bottom:none}
.avail-table tr:hover td{background:#22222255}
.avail-btn{padding:3px 9px;border-radius:6px;border:1px solid transparent;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.avail-btn.yes{background:var(--green)55;color:var(--court);border-color:var(--court)44}
.avail-btn.yes.active{background:var(--green);color:var(--court);border-color:var(--court)}
.avail-btn.no{background:#3d1a1a55;color:#e63946;border-color:#e6394644}
.avail-btn.no.active{background:#e63946;color:#fff;border-color:#e63946}
.avail-btn.maybe{background:#2e2a1a55;color:var(--warn);border-color:var(--warn)44}
.avail-btn.maybe.active{background:var(--warn);color:var(--dark);border-color:var(--warn)}
.lineup-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:9px}
.lineup-slot{background:#181818;border:1px solid var(--border);border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:7px}
.lineup-pos{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--court);min-width:20px;text-align:center}
.lineup-slot.warning{border-color:var(--warn)77;background:#2d2215}
.lineup-slot.ok{border-color:var(--court)44}
.lineup-slot.blocked-slot{border-color:var(--danger)55;background:#2d1515}
.stats-row{display:flex;gap:9px;margin-bottom:18px;flex-wrap:wrap}
.stat-card{background:#1c1c1c;border:1px solid var(--border);border-radius:10px;padding:11px 15px;flex:1;min-width:80px;text-align:center}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--court);line-height:1}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.upload-area{border:1.5px dashed var(--border2);border-radius:10px;padding:1.6rem;text-align:center;cursor:pointer;transition:border-color .2s}
.upload-area:hover,.upload-area.drag-over{border-color:var(--court);background:rgba(116,198,157,.04)}
.upload-area strong{font-size:14px;color:var(--white)}
.upload-area p{font-size:12px;color:var(--muted);margin-top:5px}
.team-section-header{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:6px 12px;background:#141414;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.autocomplete-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;background:#1e1e1e;border:1px solid var(--border2);border-radius:8px;z-index:50;max-height:220px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.4);margin-top:3px}
.ac-item{padding:8px 12px;font-size:13px;cursor:pointer;color:var(--white);display:flex;align-items:center;gap:8px}
.ac-item:hover{background:#2a2a2a}
.ac-item .ac-meta{font-size:11px;color:var(--muted);margin-left:auto}
.ac-item.blocked{opacity:.6}
.rule-box{background:#181818;border-left:3px solid var(--court);border-radius:0 8px 8px 0;padding:8px 12px;margin:9px 0;font-size:12px;color:var(--muted);line-height:1.6}
.rule-box.warn{border-left-color:var(--warn)}
.rule-box.danger{border-left-color:var(--danger)}
.rule-box strong{color:var(--white)}
.prog-bar{height:4px;border-radius:3px;background:#2a2a2a;overflow:hidden}
.prog-fill{height:100%;background:var(--court);border-radius:3px;transition:width .3s}
.empty{text-align:center;padding:2.5rem 20px;color:var(--muted);font-size:13px}
.modal-overlay{position:fixed;inset:0;background:#000000bb;z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#1e1e1e;border:1px solid var(--border2);border-radius:16px;padding:20px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--court);margin-bottom:12px}
.modal-close{float:right;cursor:pointer;color:var(--muted);font-size:18px;background:none;border:none}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--muted);border-top-color:var(--court);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
.g-m{background:#1a1a2e;color:#7eb8e0;border:1px solid #4ea8de44;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}
.g-f{background:#2d1a2d;color:#c77dff;border:1px solid #c77dff44;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}
.player-view{display:none;position:fixed;inset:0;background:var(--dark);z-index:300;overflow-y:auto;padding:18px}
.player-view.open{display:block}
.pv-header{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.pv-back{background:none;border:1px solid #2e4a42;color:var(--muted);border-radius:8px;padding:6px 12px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer}
.pv-title{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--court);letter-spacing:1px}
.pv-sub{font-size:11px;color:var(--muted);margin-top:1px}
.block-panel{background:#1e1212;border:1px solid var(--danger)44;border-radius:10px;padding:12px 15px;margin-bottom:10px}
.block-panel-title{font-size:12px;font-weight:600;color:var(--danger);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.warn-panel{background:#1e1a0e;border:1px solid var(--warn)44;border-radius:10px;padding:12px 15px;margin-bottom:10px}
.warn-panel-title{font-size:12px;font-weight:600;color:var(--warn);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
@media(max-width:640px){main{padding:12px}header{padding:10px 12px}.tabs{padding:0 12px}.lineup-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="login-overlay" style="position:fixed;inset:0;background:#0d1a10;display:flex;align-items:center;justify-content:center;z-index:9999;font-family:'DM Sans',sans-serif;">
  <div style="background:#1e1e1e;border:1px solid #333;border-radius:14px;padding:36px 32px;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,.6);">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.1em;color:#74c69d">FÜCHSE BERLIN</div>
      <div style="font-size:.7rem;color:#666;letter-spacing:.1em;text-transform:uppercase;margin-top:2px">Club Manager · Admin</div>
    </div>
    <div style="margin-bottom:12px">
      <label style="font-size:.7rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#666;display:block;margin-bottom:5px">Benutzer</label>
      <input id="login-user" type="text" autocomplete="username" style="width:100%;background:#111;border:1px solid #333;border-radius:8px;color:#f0f0f0;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none" placeholder="admin" onkeydown="if(event.key==='Enter')document.getElementById('login-pass').focus()">
    </div>
    <div style="margin-bottom:20px">
      <label style="font-size:.7rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#666;display:block;margin-bottom:5px">Passwort</label>
      <input id="login-pass" type="password" autocomplete="current-password" style="width:100%;background:#111;border:1px solid #333;border-radius:8px;color:#f0f0f0;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button onclick="doLogin()" style="width:100%;padding:11px;border-radius:8px;border:none;background:#2d6a4f;color:#fff;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer">Einloggen</button>
    <div id="login-error" style="margin-top:12px;font-size:.8rem;color:#e63946;text-align:center;min-height:18px;font-weight:500"></div>
  </div>
</div>
<script>
(function(){
  const CREDS={admin:'argentina'};const KEY='fcb_admin_auth';
  if(sessionStorage.getItem(KEY)==='ok'){document.getElementById('login-overlay').style.display='none';}
  window.doLogin=function(){
    const user=document.getElementById('login-user').value.trim();
    const pass=document.getElementById('login-pass').value;
    const err=document.getElementById('login-error');
    if(CREDS[user]&&CREDS[user]===pass){
      sessionStorage.setItem(KEY,'ok');
      const o=document.getElementById('login-overlay');
      o.style.opacity='0';o.style.transition='opacity .3s';
      setTimeout(()=>o.style.display='none',300);
    }else{
      err.textContent='Falscher Benutzer oder Passwort';
      document.getElementById('login-pass').value='';
      setTimeout(()=>err.textContent='',2000);
    }
  };
})();
</script>

function teamNumber(team){
  // state.teams stores teamNumber (camelCase), DB rows have team_number (snake_case)
  const n=parseInt(team.teamNumber||team.team_number||0);

  // Fallback: roman suffix in name (II, III, IV...)
  const roman={I:1,II:2,III:3,IV:4,V:5,VI:6,VII:7,VIII:8};
  const r=team.name.match(/\b(VIII|VII|VI|IV|V|III|II)\b/);
  if(r)return roman[r[1]]||1;

}

// ── BLOCKING LOGIC ──
// Rule 1 – STAMMKADER: Players sorted by LK within a category.
//   Pos 1–6 (Sommer) / 1–4 (Winter) → Team 1, next group → Team 2, etc.
//   Cannot play in teams with HIGHER number than their Stammkader team.
// Rule 2 – STAMMMANNSCHAFT: 2+ matches played in team X → blocked in all teams
//   with higher number than X, within the same category.
// Both rules are INDEPENDENT and applied separately.

function getStammkaderTeam(playerId, catGroup){
  const catTeams=state.teams.filter(t=>t.category===catGroup).sort((a,b)=>teamNumber(a)-teamNumber(b));
  if(!catTeams.length)return null;
  const playerRanks=state.rankByTeam[playerId]||{};
  let rankInCat=null;
  for(const t of catTeams){if(playerRanks[t.id]!=null){rankInCat=playerRanks[t.id];break;}}
  if(rankInCat==null){const p=playerById(playerId);rankInCat=p?.rank||null;}
  if(rankInCat==null)return null;
  let remaining=rankInCat;
  for(const t of catTeams){const gs=teamSize(t);if(remaining<=gs)return t;remaining-=gs;}
  return catTeams[catTeams.length-1];
}

function getPlayerBlockStatus(playerId, catGroup){
  const counts=state.matchCounts[playerId]||{};
  const catTeams=state.teams.filter(t=>t.category===catGroup).sort((a,b)=>teamNumber(a)-teamNumber(b));

  // Rule 1: Stammkader
  const stammkaderTeam=getStammkaderTeam(playerId,catGroup);
  const stammkaderTeamNum=stammkaderTeam?teamNumber(stammkaderTeam):null;
  const stammkaderBlocked=stammkaderTeamNum!==null?catTeams.filter(t=>teamNumber(t)>stammkaderTeamNum):[];

  // Rule 2: Stammmannschaft
  let highestBlockTeamNum=null,stammmannschaftSource='';
  for(const t of catTeams){
    const c=counts[t.id]||0;
    if(c>=2){const num=teamNumber(t);if(highestBlockTeamNum===null||num<highestBlockTeamNum){highestBlockTeamNum=num;stammmannschaftSource=t.name;}}
  }
  const stammmannschaftBlocked=highestBlockTeamNum!==null?catTeams.filter(t=>teamNumber(t)>highestBlockTeamNum):[];
  const stammmannschaftWarned=catTeams.filter(t=>{const c=counts[t.id]||0;return c===1&&(highestBlockTeamNum===null||teamNumber(t)<=highestBlockTeamNum);});

  const allBlockedIds=new Set([...stammkaderBlocked.map(t=>t.id),...stammmannschaftBlocked.map(t=>t.id)]);
  return{stammkaderTeam,stammkaderTeamNum,stammkaderBlocked,stammmannschaftBlocked,stammmannschaftWarned,stammmannschaftSource,highestBlockTeamNum,blocked:catTeams.filter(t=>allBlockedIds.has(t.id)),warned:stammmannschaftWarned};
}

function isPlayerBlockedForTeam(playerId,teamId){
  const team=teamById(teamId);if(!team)return false;
  const status=getPlayerBlockStatus(playerId,team.category);
  return status.blocked.some(b=>b.id===teamId);
}

function blockReasonForTeam(playerId,teamId){
  const team=teamById(teamId);if(!team)return'';
  const status=getPlayerBlockStatus(playerId,team.category);
  const reasons=[];
  if(status.stammkaderBlocked.some(t=>t.id===teamId))reasons.push(`Stammkader ${status.stammkaderTeam?.name||''}`);
  if(status.stammmannschaftBlocked.some(t=>t.id===teamId))reasons.push(`Stammmannschaft (2× ${status.stammmannschaftSource})`);
  return reasons.join(' · ');
}

async function loadAll(){
  setSync('ing',tr('syncIng'));
  try{
    const[teams,players,matches,avRows,lineupRows,countRows]=await Promise.all([
      sbGet('teams','order=category,team_number'),
      sbGet('players','order=lk'),
      sbGet('matches','order=date'),
      sbGet('availability',''),
      sbGet('lineups',''),
      sbGet('player_match_counts','')
    ]);
    state.teams=teams.map(t=>({id:t.id,name:t.name,liga:t.liga,season:t.season,is_4er:t.is_4er||false,category:t.category||'Herren',teamNumber:t.team_number||1,gender:t.gender||catGender(t.category)}));
    state.players=players.map(p=>({id:p.id,name:p.name,rawName:p.raw_name,idnr:p.idnr,lk:p.lk,lkStr:p.lk_str,year:p.year,teamIds:[],gender:p.gender||'M',rank:p.rank}));
    state.matches=matches.map(m=>({id:m.id,teamId:m.team_id,opponent:m.opponent,date:m.date,time:m.time,home:m.home,venue:m.venue}));
    state.availability={};
    for(const r of avRows){if(!state.availability[r.match_id])state.availability[r.match_id]={};state.availability[r.match_id][r.player_id]=r.status;}
    state.lineups={};
    for(const r of lineupRows)state.lineups[r.match_id]=r.slots;
    state.matchCounts={};
    for(const r of countRows){if(!state.matchCounts[r.player_id])state.matchCounts[r.player_id]={};state.matchCounts[r.player_id][r.team_id]=r.matches_played;}
    const ptRows=await sbGet('player_teams','');
    state.rankByTeam={};
    for(const r of ptRows){
      const p=state.players.find(x=>x.id===r.player_id);
      if(p&&!p.teamIds.includes(r.team_id))p.teamIds.push(r.team_id);
      if(r.rank!=null){if(!state.rankByTeam[r.player_id])state.rankByTeam[r.player_id]={};state.rankByTeam[r.player_id][r.team_id]=r.rank;}
    }
    setSync('ok',tr('syncOk'));
    renderAll();
  }catch(e){setSync('err',tr('syncErr'));console.error(e);}
}

async function parsePDF(file){
  const ab=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:ab}).promise;
  let txt='';
  for(let i=1;i<=pdf.numPages;i++){const pg=await pdf.getPage(i);const tc=await pg.getTextContent();txt+=tc.items.map(x=>x.str).join(' ')+'\n';}
  return extractPlayers(txt);
}

function extractPlayers(text){
  const teams={};
  const tPat=/(Herren\s*(?:\d+\s*)?(?:II|III|IV|V|VI|VII)?|Damen\s*(?:\d+\s*)?(?:II|III|IV|V)?)\s*(?:\(4er\))?\s*\|\s*([^\n\r]+)/gi;
  let tm;
  while((tm=tPat.exec(text))!==null){
    const raw=tm[1].trim().replace(/\s+/,' ');
    const catMatch=raw.match(/^(Herren|Damen)(?:\s+(\d+))?/i);
    const baseCat=catMatch?catMatch[1].charAt(0).toUpperCase()+catMatch[1].slice(1).toLowerCase():'Herren';
    const ageGroup=catMatch&&catMatch[2]?catMatch[2]:null;
    const category=ageGroup?`${baseCat} ${ageGroup}`:baseCat;
    const roman={I:1,II:2,III:3,IV:4,V:5,VI:6,VII:7,VIII:8};
    const romanMatch=raw.match(/\s(VIII|VII|VI|IV|V|III|II|I)$/);
    const tnum=romanMatch?roman[romanMatch[1]]:1;
    const liga=tm[2].trim().replace(/MF:.*/,'').trim();
    if(!teams[raw])teams[raw]={liga,id:uid(),is4:tm[0].includes('(4er)'),category,tnum,gender:catGender(category)};
  }
  const teamArr=Object.entries(teams).map(([name,v])=>({id:v.id,name,liga:v.liga,season:'Sommer',is_4er:v.is4||false,category:v.category,team_number:v.tnum,gender:v.gender}));
  const players=[];
  const pPat=/(\d{1,3})\s+([A-ZÄÖÜa-zäöüß][A-ZÄÖÜa-zäöüß\s,.\-\']+?)\s+\((\d{4})\)\s+(?:[A-Z]{2,3}\*?\s+)?(\d{7,9})\s+(LK[\d,]+)/g;
  let m;
  while((m=pPat.exec(text))!==null){
    const rank=parseInt(m[1]),name=m[2].trim(),year=m[3],idnr=m[4];
    const lkStr=m[5],lk=parseFloat(lkStr.replace('LK','').replace(',','.'));
    // Walk teams in order to find which team this rank belongs to
    let _rem=rank,_t=null;
    for(const _team of teamArr){const _gs=(_team.is_4er||_team.season==='Winter')?4:6;if(_rem<=_gs){_t=_team;break;}_rem-=_gs;}
    const t=_t||teamArr[teamArr.length-1]||null;
    const gender=t?catGender(t.category):'M';
    players.push({rank,name,year,idnr,lkStr,lk,teamId:t?.id||null,teamName:t?.name||'?',teamCategory:t?.category||'Herren',gender});
  }
  return{players,teams:teamArr};
}

  const byTeam={};

      ${ps.slice(0,5).map(p=>`<div class="player-row" style="border-radius:0;border:none;border-bottom:1px solid #2e4a4233;margin:0">
        <span style="color:var(--muted);min-width:18px;font-size:11px">${p.rank}</span>
        <div class="player-avatar">${initials(p.name.includes(',')?p.name.split(',')[1].trim()+' '+p.name.split(',')[0]:p.name)}</div>

    </div>`;

async function confirmImport(){
  const data=state._pending;if(!data)return;
  const btn=document.querySelector('#preview-section .btn-primary');btn.textContent='...';btn.disabled=true;
  setSync('ing',tr('syncIng'));
  try{
    // Insert NEW teams; update season for existing ones if PDF says (4er)
    const teamsToInsert=data.teams.filter(t=>!state.teams.find(x=>x.name===t.name));
    if(teamsToInsert.length)await sbUpsert('teams',teamsToInsert.map(t=>({id:t.id,name:t.name,liga:t.liga,season:t.season,is_4er:t.is_4er||false,category:t.category,team_number:t.team_number,gender:t.gender})));
    // Update is_4er for existing teams detected as (4er) in PDF
    for(const t of data.teams.filter(x=>x.is_4er)){const ex=state.teams.find(x=>x.name===t.name);if(ex&&!ex.is_4er)await fetch(`${SB_URL}/rest/v1/teams?id=eq.${ex.id}`,{method:'PATCH',headers:HDR,body:JSON.stringify({is_4er:true})});}

    const freshTeams=await sbGet('teams','');
    state.teams=freshTeams.map(t=>({id:t.id,name:t.name,liga:t.liga,season:t.season,category:t.category||'Herren',teamNumber:t.team_number||1,gender:t.gender||catGender(t.category)}));
    const playersToInsert=[];
    const playersToUpdate=[];  // existing players whose LK may have changed
    const ptInsert=[];
    for(const p of data.players){
      const dn=p.name.includes(',')?p.name.split(',')[1].trim()+' '+p.name.split(',')[0].trim():p.name;
      const teamId=state.teams.find(x=>x.name===p.teamName)?.id||null;
      const existing=state.players.find(x=>x.idnr===p.idnr);
      if(!existing){
        // New player
        playersToInsert.push({id:uid(),name:dn,raw_name:p.name,idnr:p.idnr,lk:p.lk,lk_str:p.lkStr,year:p.year,gender:p.gender||'M',rank:p.rank});
      } else if(existing.lk!==p.lk){
        // Existing player with updated LK — update it
        playersToUpdate.push({id:existing.id,lk:p.lk,lk_str:p.lkStr});
      }
      // Assign to Stammkader team AND all higher (lower-numbered) teams in category.
      // A player at pos 21 (Herren IV) can play in I, II, III and IV.
      const pid2=existing?.id||playersToInsert.find(x=>x.idnr===p.idnr)?.id;
      if(pid2&&teamId){
        const catTeams=state.teams.filter(t=>t.category===p.teamCategory)
          .sort((a,b)=>teamNumber(a)-teamNumber(b));
        const stammIdx=catTeams.findIndex(t=>t.id===teamId);
        const assignTo=stammIdx>=0?catTeams.slice(0,stammIdx+1):[{id:teamId}];
        for(const at of assignTo){
          ptInsert.push({player_id:pid2,team_id:at.id,rank:p.rank||null});
        }
      }
    }
    if(playersToInsert.length){for(let i=0;i<playersToInsert.length;i+=100)await sbUpsert('players',playersToInsert.slice(i,i+100));}
    // Update LK for existing players individually
    for(const upd of playersToUpdate){
      await fetch(`${SB_URL}/rest/v1/players?id=eq.${upd.id}`,{method:'PATCH',headers:HDR,body:JSON.stringify({lk:upd.lk,lk_str:upd.lk_str})});
    }
    // Add new team assignments without removing existing ones
    if(ptInsert.length){for(let i=0;i<ptInsert.length;i+=100)await sbUpsert('player_teams',ptInsert.slice(i,i+100));}
    await loadAll();
    document.getElementById('preview-section').style.display='none';
    document.getElementById('parse-status').textContent=T[lang].importedMsg(playersToInsert.length,state.players.length);
  }catch(e){setSync('err',tr('syncErr'));console.error(e);}
  finally{btn.disabled=false;applyT();}
}

  if(onlyBlocked){players=players.filter(p=>{const cats=[...new Set(p.teamIds.map(tid=>teamById(tid)?.category).filter(Boolean))];return cats.some(cat=>getPlayerBlockStatus(p.id,cat).blocked.length>0);});}

    const cats=[...new Set(teams.map(t=>t.category))];
    let blockedChips='',warnChips='';
    for(const cat of cats){const{blocked,warned}=getPlayerBlockStatus(p.id,cat);for(const b of blocked)blockedChips+=`<span class="blocked-badge">⛔ ${b.name}</span>`;for(const w of warned)warnChips+=`<span class="warn-badge">⚠ ${w.name}</span>`;}

  const byCat={};
  for(const t of state.teams){const c=t.category||'Herren';if(!byCat[c])byCat[c]=[];byCat[c].push(t);}
  let html='';
  for(const[cat,teams]of Object.entries(byCat)){

    html+=`<div style="margin-bottom:6px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">${cat}</div>`;

      html+=`<div class="card" style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px">
          <div>
            <div style="display:flex;align-items:center;gap:7px">
              <span style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--court)">${t.name}</span>
              <span class="${t.gender==='F'?'g-f':'g-m'}">${t.gender==='F'?'F':'M'}</span>
            </div>
            <div style="font-size:11px;color:var(--muted)">${t.liga} · ${t.season} · #${teamNumber(t)}</div>
          </div>

        </div>

          <div class="player-avatar" style="width:24px;height:24px;font-size:9px">${initials(p.name)}</div>

async function editTeamSize(teamId){
  const t=state.teams.find(x=>x.id===teamId);if(!t)return;
  if(t.season==='Winter'){alert('Winter teams are always 4 players.');return;}
  const new4er=!t.is_4er;
  if(!confirm(`Change to ${new4er?'4er (4 players)':'standard (6 players)'}?`))return;
  try{
    await fetch(`${SB_URL}/rest/v1/teams?id=eq.${teamId}`,{method:'PATCH',headers:HDR,body:JSON.stringify({is_4er:new4er})});
    t.is_4er=new4er;
    renderTeams();
  }catch(e){console.error(e);}
}

async function removeTeam(id){
  try{await sbDelete('teams',`id=eq.${id}`);}catch(e){console.error(e);}
  state.teams=state.teams.filter(t=>t.id!==id);
  state.players.forEach(p=>{p.teamIds=p.teamIds.filter(tid=>tid!==id);});
  renderTeams();
}

function openAssignModal(playerId){
  const p=playerById(playerId);
  document.getElementById('assign-modal-title').textContent=p.name;
  const compatible=state.teams.filter(t=>t.gender===p.gender||t.gender===undefined);
  const byCat={};
  for(const t of compatible){const c=t.category||'?';if(!byCat[c])byCat[c]=[];byCat[c].push(t);}
  let html=`<div style="margin-bottom:12px;font-size:12px;color:var(--muted)">Mannschaften auswählen:</div>`;
  for(const[cat,teams]of Object.entries(byCat)){
    html+=`<div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">${cat}</div>`;
    for(const t of teams.sort((a,b)=>teamNumber(a)-teamNumber(b))){
      const checked=p.teamIds.includes(t.id);
      const counts=state.matchCounts[p.id]?.[t.id]||0;
      const blocked=isPlayerBlockedForTeam(p.id,t.id);
      const reason=blocked?blockReasonForTeam(p.id,t.id):'';
      html+=`<label style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:#1b2926;border-radius:8px;margin-bottom:4px;cursor:pointer;border:1px solid ${blocked?'var(--danger)33':'#2e4a42'}">
        <input type="checkbox" data-tid="${t.id}" ${checked?'checked':''} style="width:auto;padding:0">
        <span style="flex:1;font-size:13px">${t.name}</span>
        <span style="font-size:11px;color:var(--muted)">${counts} Sp.</span>
        ${blocked?`<span class="blocked-badge" title="${reason}">⛔ ${reason}</span>`:''}
      </label>`;
    }
    html+='<div style="height:6px"></div>';
  }
  html+=`<div style="display:flex;gap:8px;margin-top:12px">
    <button class="btn btn-primary" onclick="saveAssign('${playerId}')">${tr('saveAssign')}</button>
    <button class="btn btn-outline btn-sm" style="font-size:12px" onclick="closeModal('assign-modal')" data-i18n="cancel"></button>
  </div>`;
  html+=`<div style="margin-top:14px;border-top:1px solid #2e4a42;padding-top:12px">
    <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">${tr('matchesPlayed')}</div>
    ${state.teams.filter(t=>compatible.some(x=>x.id===t.id)).map(t=>{
      const c=state.matchCounts[p.id]?.[t.id]||0;
      return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:12px">
        <span style="flex:1">${t.name}</span>
        <button onclick="adjustCount('${p.id}','${t.id}',-1)" style="background:#181818;border:1px solid var(--border);color:var(--white);border-radius:5px;padding:1px 7px;cursor:pointer">−</button>
        <span style="min-width:20px;text-align:center;font-weight:600" id="cnt-${p.id}-${t.id}">${c}</span>
        <button onclick="adjustCount('${p.id}','${t.id}',1)" style="background:#181818;border:1px solid var(--border);color:var(--white);border-radius:5px;padding:1px 7px;cursor:pointer">+</button>
      </div>`;
    }).join('')}
  </div>`;
  document.getElementById('assign-modal-body').innerHTML=html;
  document.getElementById('assign-modal').classList.add('open');
}

async function adjustCount(playerId,teamId,delta){
  if(!state.matchCounts[playerId])state.matchCounts[playerId]={};
  const cur=state.matchCounts[playerId][teamId]||0;
  const next=Math.max(0,cur+delta);
  state.matchCounts[playerId][teamId]=next;
  const el=document.getElementById(`cnt-${playerId}-${teamId}`);
  if(el)el.textContent=next;
  try{await sbUpsert('player_match_counts',[{player_id:playerId,team_id:teamId,matches_played:next}]);}catch(e){console.error(e);}
  renderBlocking();
}

async function saveAssign(playerId){
  const p=playerById(playerId);
  const checkboxes=document.querySelectorAll('#assign-modal-body input[type="checkbox"][data-tid]');
  const newTeamIds=[...checkboxes].filter(c=>c.checked).map(c=>c.getAttribute('data-tid'));
  const toRemove=p.teamIds.filter(tid=>!newTeamIds.includes(tid));
  const toAdd=newTeamIds.filter(tid=>!p.teamIds.includes(tid));
  for(const tid of toRemove){try{await sbDelete('player_teams',`player_id=eq.${playerId}&team_id=eq.${tid}`);}catch(e){console.error(e);}}
  if(toAdd.length)await sbUpsert('player_teams',toAdd.map(tid=>({player_id:playerId,team_id:tid})));
  p.teamIds=newTeamIds;
  closeModal('assign-modal');renderPlayers();renderTeams();renderBlocking();
}

function closeModal(id){document.getElementById(id).classList.remove('open');}

// ── MATCHES ──
function populateTeamSel(selId){const sel=document.getElementById(selId);if(!sel)return;const cur=sel.value;sel.innerHTML=state.teams.map(t=>`<option value="${t.id}">${t.name}</option>`).join('');if(cur)sel.value=cur;}

async function addMatch(){
  const teamId=document.getElementById('m-team')?.value;
  const opp=document.getElementById('m-opp')?.value.trim();
  const date=document.getElementById('m-date')?.value;
  const time=document.getElementById('m-time')?.value||'10:00';
  const home=document.getElementById('m-home')?.value;
  const venue=document.getElementById('m-venue')?.value.trim();
  if(!teamId||!opp||!date){alert(tr('matchAlert'));return;}
  const nm={id:uid(),teamId,opponent:opp,date,time,home,venue};
  try{await sbUpsert('matches',[{id:nm.id,team_id:teamId,opponent:opp,date,time,home,venue}]);state.matches.push(nm);}catch(e){console.error(e);}
  document.getElementById('m-opp').value='';document.getElementById('m-venue').value='';

}

function renderMatches(){
  populateTeamSel('m-team');

  if(!state.matches.length){el.innerHTML=`<div class="empty">${tr('noMatches')}</div>`;return;}
  const sorted=[...state.matches].sort((a,b)=>a.date.localeCompare(b.date));
  el.innerHTML=sorted.map(m=>{
    const team=teamById(m.teamId);
    const avail=state.availability[m.id]||{};
    const tp=state.players.filter(p=>p.teamIds.includes(m.teamId));
    const yes=tp.filter(p=>avail[p.id]==='yes').length;

    return`<div class="match-card" onclick="openMatchAvail('${m.id}')">

        <div>
          <div class="match-teams">${team?.name||'?'}<span class="match-vs">vs</span>${(m.opponent||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
          <div class="match-info">📅 ${fmtDate(m.date)} · ${m.time} · ${m.home} · 📍 ${m.venue||'—'}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
          <span class="match-status ${hasLineup?'status-ready':'status-open'}">${hasLineup?'✓ OK':'⏳'}</span>
          <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();openPlayerView('${m.id}')" style="font-size:10px;padding:2px 7px">${tr('pvOpenView')}</button>

      </div>
      <div style="display:flex;align-items:center;gap:9px">
        <div class="prog-bar" style="flex:1"><div class="prog-fill" style="width:${pct}%"></div></div>
        <span style="font-size:11px;color:var(--muted)">${yes}/${tp.length} ${tr('available')}</span>
      </div>

  }).join('');

async function setAvail(matchId,playerId,status){
  if(!state.availability[matchId])state.availability[matchId]={};

  try{await sbUpsert('availability',[{match_id:matchId,player_id:playerId,status}]);}catch(e){console.error(e);}

// ── BLOCKING VIEW ──
function renderBlocking(){
  const cats=[...new Set(state.teams.map(t=>t.category))].sort();
  const catSel=document.getElementById('block-cat-filter');
  const curCat=catSel?.value||'';
  if(catSel){catSel.innerHTML=`<option value="">${tr('allCategories')}</option>`+cats.map(c=>`<option value="${c}" ${curCat===c?'selected':''}>${c}</option>`).join('');catSel.value=curCat;}
  const el=document.getElementById('blocking-content');
  const filterCat=catSel?.value||'';
  const catsToShow=filterCat?[filterCat]:cats;
  let html=`<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
    <div class="rule-box" style="flex:1;margin:0"><strong>Stammkader:</strong> Pos. 1–6 (Sommer) / 1–4 (Winter) → Mannschaft 1, usw. Spieler dürfen nicht in niedrigere Mannschaft der Kategorie.</div>
    <div class="rule-box warn" style="flex:1;margin:0"><strong>Stammmannschaft:</strong> 2 Spiele in einer Mannschaft → gesperrt für alle niedrigeren in dieser Kategorie.</div>
  </div>`;
  let anyEntry=false;
  for(const cat of catsToShow){
    const catTeams=state.teams.filter(t=>t.category===cat).sort((a,b)=>teamNumber(a)-teamNumber(b));
    if(!catTeams.length)continue;
    const groupSize=teamSize(catTeams[0]);
    const catPlayers=state.players.filter(p=>p.teamIds.some(tid=>catTeams.find(t=>t.id===tid))).sort((a,b)=>{
      const rankA=Math.min(...catTeams.map(t=>state.rankByTeam[a.id]?.[t.id]??999));
      const rankB=Math.min(...catTeams.map(t=>state.rankByTeam[b.id]?.[t.id]??999));
      return rankA-rankB;
    });
    if(!catPlayers.length)continue;
    anyEntry=true;
    html+=`<div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--court);letter-spacing:1px;margin:14px 0 8px">${cat}</div>`;
    html+=`<div class="card" style="padding:0;overflow:hidden;overflow-x:auto;margin-bottom:10px">`;
    html+=`<table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr style="border-bottom:1px solid #2e4a42">
        <th style="padding:8px 12px;text-align:left;font-weight:600;color:var(--muted);min-width:160px">Spieler</th>
        <th style="padding:8px 8px;text-align:center;font-weight:600;color:var(--muted);font-size:10px">LK</th>
        <th style="padding:8px 8px;text-align:center;font-weight:600;color:var(--muted);font-size:10px">Jg.</th>
        ${catTeams.map(t=>`<th style="padding:8px 8px;text-align:center;font-weight:600;color:var(--court);font-size:11px;white-space:nowrap">${t.name}${t.is_4er?' <span style="font-size:9px;color:var(--warn)">(4er)</span>':''}</th>`).join('')}
      </tr></thead><tbody>`;
    for(let i=0;i<catPlayers.length;i++){
      const p=catPlayers[i];
      const status=getPlayerBlockStatus(p.id,cat);
      const counts=state.matchCounts[p.id]||{};
      const _rankInCat2=Math.min(...catTeams.map(t=>state.rankByTeam[catPlayers[i].id]?.[t.id]??999));
      let _r2=_rankInCat2<999?_rankInCat2:(i+1),_skTeam=catTeams[catTeams.length-1];
      for(const _t2 of catTeams){const _gs2=teamSize(_t2);if(_r2<=_gs2){_skTeam=_t2;break;}_r2-=_gs2;}
      const skTeam=_skTeam;
      const cells=catTeams.map(t=>{
        const c=counts[t.id]||0;
        const isSkTeam=t.id===skTeam.id;
        const isSkBlocked=status.stammkaderBlocked.some(x=>x.id===t.id);
        const isSmBlocked=status.stammmannschaftBlocked.some(x=>x.id===t.id);
        const isSmWarned=status.stammmannschaftWarned.some(x=>x.id===t.id);
        const isAssigned=p.teamIds.includes(t.id);
        let bg='',txt='',label='',title='';
        if(isSkTeam){bg='background:#1a2d3d';txt='color:var(--info)';label='SK';title='Stammkader';}
        if(isSmBlocked&&isSkBlocked){bg='background:#3d1a1a';txt='color:var(--danger)';label=`⛔${c>0?` (${c})`:''}`;title='SK + SM';}
        else if(isSmBlocked){bg='background:#2d1a1a';txt='color:var(--danger)';label=`SM${c>0?` (${c})`:''}`;title=`2× ${status.stammmannschaftSource}`;}
        else if(isSkBlocked){bg='background:#1a1a2d';txt='color:#a78bfa';label='SK⛔';title='Stammkader gesperrt';}
        else if(isSmWarned){bg='background:#2d2215';txt='color:var(--warn)';label=`⚠ ${c}/2`;title='1 Spiel';}
        else if(c>0){txt='color:var(--court)';label=`${c}×`;}
        else if(isAssigned){txt='color:var(--muted)';label='—';}
        else{txt='color:#2e4a42';label='·';}
        return`<td style="padding:7px 8px;text-align:center;border-left:1px solid #2e4a4222;${bg}" title="${title}"><span style="font-size:11px;font-weight:600;${txt}">${label}</span></td>`;
      }).join('');
      const rowBg=status.blocked.length>0?'background:#1e1e1e':'';
      html+=`<tr style="border-bottom:1px solid #2e4a4222;${rowBg}">
        <td style="padding:7px 12px;white-space:nowrap"><div style="font-weight:600;font-size:12px">${p.name}</div></td>
        <td style="padding:7px 8px;text-align:center"><span class="lk-badge" style="font-size:10px">${p.lkStr||'?'}</span></td>
        <td style="padding:7px 8px;text-align:center;font-size:11px;color:var(--muted)">${p.year||'—'}</td>
        ${cells}
      </tr>`;
    }
    html+=`</tbody></table>
      <div style="padding:8px 12px;display:flex;gap:10px;flex-wrap:wrap;border-top:1px solid #2e4a42">
        <span style="font-size:10px;color:var(--info)">■ SK = Stammkader</span>
        <span style="font-size:10px;color:#a78bfa">■ SK⛔ = Stammkader gesperrt</span>
        <span style="font-size:10px;color:var(--danger)">■ SM = Stammmannschaft gesperrt</span>
        <span style="font-size:10px;color:var(--warn)">■ ⚠ = 1 Spiel</span>
        <span style="font-size:10px;color:var(--court)">■ Zahl = Spiele</span>
      </div></div>`;
  }
  if(!anyEntry)html+=`<div class="empty">${tr('noBlocked')}</div>`;
  el.innerHTML=html;
}

// ── LINEUP ──
async function autoLineup(matchId){
  const match=state.matches.find(m=>m.id===matchId);if(!match)return;
  const team=teamById(match.teamId);
  const avail=state.availability[matchId]||{};
  const size=teamSize(team);
  const available=[...state.players.filter(p=>p.teamIds.includes(match.teamId)&&avail[p.id]==='yes'&&!isPlayerBlockedForTeam(p.id,match.teamId))].sort((a,b)=>a.lk-b.lk);
  const slots=available.slice(0,size).map(p=>p.id);
  state.lineups[matchId]=slots;
  try{await sbUpsert('lineups',[{match_id:matchId,slots}]);}catch(e){console.error(e);}
  goToLineup(matchId);
}

function goToLineup(matchId){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===5));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-lineup').classList.add('active');
  populateMatchSel('lineup-match');
  document.getElementById('lineup-match').value=matchId;
  renderLineup();
}

async function setLineupPlayer(matchId,pos,playerId){
  if(!state.lineups[matchId])state.lineups[matchId]=[];
  state.lineups[matchId][pos]=playerId||null;
  try{await sbUpsert('lineups',[{match_id:matchId,slots:state.lineups[matchId]}]);}catch(e){console.error(e);}
  renderLineup();

  const team=teamById(match.teamId);

  const allTp=[...state.players.filter(p=>p.teamIds.includes(match.teamId))].sort((a,b)=>a.lk-b.lk);
  const lineup=state.lineups[matchId]||[];
  const warnings=[];
  for(let i=0;i<size-1;i++){const p1=lineup[i]?playerById(lineup[i]):null;const p2=lineup[i+1]?playerById(lineup[i+1]):null;if(p1&&p2&&lkVal(p1.lk)>lkVal(p2.lk))warnings.push(T[lang].lkViolation(i+1,p1.lkStr,i+2,p2.lkStr));}
  const blockedWarnings=lineup.filter(Boolean).map(pid=>{const p=playerById(pid);if(!p)return null;if(isPlayerBlockedForTeam(pid,match.teamId))return T[lang].blockedInLineup(p.name,teamById(match.teamId)?.name);return null;}).filter(Boolean);
  let dHtml='';
  for(let d=0;d<dc;d++){const p1=lineup[d*2]?playerById(lineup[d*2]):null;const p2=lineup[d*2+1]?playerById(lineup[d*2+1]):null;dHtml+=`<div class="lineup-slot"><div class="lineup-pos">D${d+1}</div><div style="font-size:12px">${p1&&p2?`${p1.name} / ${p2.name}`:`<span style="color:var(--muted);font-style:italic">—</span>`}</div></div>`;}
  el.innerHTML=`<div class="card">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--court);margin-bottom:2px">${team?.name||'?'} vs ${match.opponent}</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px">${fmtDate(match.date)} · ${match.time}</div>
    ${blockedWarnings.length?`<div class="rule-box danger">${blockedWarnings.map(w=>`<div>${w}</div>`).join('')}</div>`:''}
    ${warnings.length?`<div style="background:#3d1a1a;border:1px solid var(--danger)44;border-radius:8px;padding:8px 12px;margin-bottom:9px">${warnings.map(w=>`<div style="font-size:12px;color:var(--danger)">${w}</div>`).join('')}</div>`:lineup.filter(Boolean).length>=size&&!blockedWarnings.length?`<div style="background:#1a2d22;border:1px solid var(--court)33;border-radius:8px;padding:6px 12px;margin-bottom:9px;font-size:12px;color:var(--court)">${tr('lineupValid')}</div>`:''}
    <div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">${tr('singles')}</div>

        const pid=lineup[i]||'';const p=pid?playerById(pid):null;
        const prev=i>0&&lineup[i-1]?playerById(lineup[i-1]):null;
        const lkOk=!p||!prev||lkVal(p.lk)>=lkVal(prev.lk);
        const isBlocked=pid?isPlayerBlockedForTeam(pid,match.teamId):false;
        return`<div class="lineup-slot ${p?(isBlocked?'blocked-slot':lkOk?'ok':'warning'):''}">
          <div class="lineup-pos">${i+1}</div>
          <select style="flex:1;background:#181818;border:1px solid var(--border);border-radius:6px;color:var(--white);padding:4px 8px;font-size:11px;font-family:'DM Sans',sans-serif" onchange="setLineupPlayer('${matchId}',${i},this.value)">
            <option value="">—</option>
            ${allTp.map(tp=>{const bl=isPlayerBlockedForTeam(tp.id,match.teamId);return`<option value="${tp.id}" ${pid===tp.id?'selected':''}>${bl?'⛔ ':''}${tp.name} (${tp.lkStr}) ${avail[tp.id]==='yes'?'✓':avail[tp.id]==='no'?'✗':'?'} ${tp.year||''}</option>`;}).join('')}
          </select>
        </div>`;
      }).join('')}

  'H Verbandsliga':'Herren','H Bezirksoberliga I':'Herren','H Bezirksliga I':'Herren','H Bezirksklasse I':'Herren',
  'H Bezirksoberliga':'Herren','H Bezirksliga':'Herren','H Bezirksklasse':'Herren',

  'H30 Bezirksoberliga':'Herren 30','H30 Bezirksklasse':'Herren 30',
  'H40 Bezirksoberliga I':'Herren 40','H40 Bezirksoberliga':'Herren 40',
  'H50 Verbandsliga':'Herren 50','H50 Bezirksklasse II':'Herren 50','H50 Bezirksklasse':'Herren 50',
  'H55 Bezirksoberliga I':'Herren 55','H55 Bezirksoberliga':'Herren 55',
  'H60 Verbandsliga':'Herren 60','H60 Bezirksoberliga I':'Herren 60',
  'M70OL':'Herren 70','H70':'Herren 70',
  'H75 Meisterklasse':'Herren 75','H75 Verbandsoberliga':'Herren 75',
  'D00 Bezirksoberliga I':'Damen','D00 Bezirksoberliga':'Damen',
  'D30 Verbandsliga':'Damen 30','D40 Verbandsoberliga':'Damen 40',
  'D50 Verbandsliga':'Damen 50','D60 Bezirksoberliga I':'Damen 60','D60 Bezirksoberliga':'Damen 60',
};
const JUVENILE_RE=/^(U\d+|Mid\b)/i;

function ligaToCategory(liga){
  if(LIGA_CAT_MAP[liga])return LIGA_CAT_MAP[liga];
  for(const[key,val]of Object.entries(LIGA_CAT_MAP)){if(liga.startsWith(key))return val;}
  if(/^H\d+/.test(liga)){const m=liga.match(/^H(\d+)/);return`Herren ${m[1]}`;}
  if(/^D\d+/.test(liga)){const m=liga.match(/^D(\d+)/);return`Damen ${m[1]}`;}
  if(/^H\b/.test(liga))return'Herren';
  if(/^D\b/.test(liga)||/^D00/.test(liga))return'Damen';
  return null;
}

// TEAMS PDF PARSER (ResultReport) — POSICIÓN X/Y
// Busca TODAS las ocurrencias de "Füchse Berlin Reinickendorf e.V."
// por fila con matchAll, incluyendo sufijos romanos II/III/IV
// ══════════════════════════════════════════════════════

  document.getElementById('teams-parse-status').textContent='...';
  try{

    state._pendingTeams=teams;
    showTeamsPreview(teams);
    document.getElementById('teams-parse-status').textContent=T[lang].teamsParsedMsg(teams.length);
  }catch(err){document.getElementById('teams-parse-status').textContent='Fehler: '+err.message;console.error(err);}
  e.target.value='';

async function parseResultReportPDF(file){
  // PDF.js devuelve cada celda como un item completo (no palabras sueltas).
  // Ej: item.str = 'Herren 70 Ostliga Gruppe B'  x=28
  //     item.str = 'Füchse Berlin Reinickendorf e.V. III'  x=637
  //
  // Algoritmo:
  //   1. Agrupar items por Y (tolerancia 4px)
  //   2. Fila con 'Gruppe' → extraer categoría+liga de cada item por columna
  //   3. Fila con 'Reinickendorf' → el item incluye el sufijo romano si existe

  const ab = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data: ab}).promise;
  const teams = [];
  const seen = new Set();
  const ROMAN = {II:2, III:3, IV:4, V:5, VI:6, VII:7, VIII:8};
  // X de inicio de cada columna (del PDF real)
  const COLS = [28, 227, 427, 626];

  function colIdx(x) {
    // Devuelve la columna más cercana para un item en x
    let best = 0, bestD = Infinity;
    for (let i = 0; i < COLS.length; i++) {
      const d = Math.abs(COLS[i] - x);
      if (d < bestD) { bestD = d; best = i; }
    }
    return best;
  }

  // active[ci] = {category, liga} o null
  const active = [null, null, null, null];

  for (let pn = 1; pn <= pdf.numPages; pn++) {
    const page = await pdf.getPage(pn);
    const vp = page.getViewport({scale: 1});
    const tc = await page.getTextContent();

    // Agrupar items por Y (tolerancia 4px → round a múltiplo de 4)
    const rows = {};
    for (const item of tc.items) {
      const s = item.str;
      if (!s || !s.trim()) continue;
      const x = Math.round(item.transform[4]);
      const y = Math.round(vp.height - item.transform[5]);
      const yk = Math.round(y / 4) * 4;
      if (!rows[yk]) rows[yk] = [];
      rows[yk].push({s: s.trim(), x});
    }

    for (const yk of Object.keys(rows).map(Number).sort((a,b)=>a-b)) {
      const items = rows[yk].sort((a,b) => a.x - b.x);
      const rowText = items.map(i => i.s).join(' ');

      // Saltar metadatos
      if (rowText.includes('nu.Dokument') || rowText.includes('Mannschaftsmeisterschaft')
          || rowText.includes('Ergebnistabellen') || rowText.includes('Pkt.')) continue;

      // ── FILA DE HEADERS ──
      // Cada item de header es una celda completa: "Herren 70 Ostliga Gruppe B"
      if (rowText.includes('Gruppe')) {
        // Resetear todas las columnas de esta fila
        for (let ci = 0; ci < 4; ci++) active[ci] = null;

        for (const item of items) {
          if (!item.s.includes('Gruppe')) continue;
          const ci = colIdx(item.x);
          // Ignorar juveniles
          if (/^(U\d+|Midcourt|Mid\b)/i.test(item.s)) { active[ci] = null; continue; }
          // Parsear adultos: "Herren 70 Ostliga Gruppe B" → cat="Herren 70", liga="Ostliga"
          const m = item.s.match(/^(Herren(?:\s+\d+)?|Damen(?:\s+\d+)?)\s+(.+?)\s+Gruppe\s+[A-Z]$/);
          active[ci] = m ? {category: m[1].trim(), liga: m[2].trim()} : null;
        }
        continue;
      }

      // ── FILA DE DATOS ──
      // Buscar items que contengan "Reinickendorf"
      for (const item of items) {
        if (!item.s.includes('Reinickendorf')) continue;
        // Ignorar la línea del título del documento
        if (item.s.includes('(12081)')) continue;

        const ci = colIdx(item.x);
        const col = active[ci];
        if (!col) continue;

        // El sufijo romano viene en el mismo item: "Füchse Berlin Reinickendorf e.V. III"
        const sm = item.s.match(/e\.V\.\s+(VIII|VII|VI|IV|V|III|II)\s*$/);
        const roman = sm ? sm[1] : null;
        const tnum = roman ? ROMAN[roman] : 1;

        const key = col.category + '__' + tnum;
        if (seen.has(key)) continue;
        seen.add(key);
        teams.push({
          id: uid(),
          name: col.category + (roman ? ' ' + roman : ''),
          category: col.category,
          liga: col.liga,
          team_number: tnum,
          season: 'Sommer',
          gender: col.category.startsWith('Damen') ? 'F' : 'M'
        });
      }
    }
  }

  teams.sort((a,b) => a.category.localeCompare(b.category) || a.team_number - b.team_number);
  return teams;
}

// MATCHES PDF PARSER (Begegnungen) — POSICIÓN X/Y
// Formato: LIGA HEIM GAST offen
// Detecta TODAS las ocurrencias del club con matchAll
// El sufijo romano (II/III/IV) determina qué equipo es
// ══════════════════════════════════════════════════════
const CLUB_NAME='Füchse Berlin Reinickendorf e.V.';
const ROMAN_MATCH={II:2,III:3,IV:4,V:5,VI:6,VII:7,VIII:8};

document.getElementById('matches-pdf-input').addEventListener('change',async e=>{
  const file=e.target.files[0];if(!file)return;
  const statusEl=document.getElementById('matches-parse-status');
  statusEl.textContent='...';
  try{
    const ab=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:ab}).promise;
    let allItems=[];
    for(let i=1;i<=pdf.numPages;i++){
      const pg=await pdf.getPage(i);
      const vp=pg.getViewport({scale:1});
      const tc=await pg.getTextContent();
      for(const item of tc.items){
        if(!item.str.trim())continue;
        const x=Math.round(item.transform[4]);
        const y=Math.round(vp.height-item.transform[5]);
        allItems.push({str:item.str.trim(),x,y,page:i});
      }
    }
    const matches=parseBegegnungenItems(allItems);
    state._pendingMatches=matches;
    showMatchesPreview(matches);
    statusEl.textContent=T[lang].matchesParsedMsg(matches.length);
  }catch(err){
    document.getElementById('matches-parse-status').textContent='Fehler: '+err.message;
    console.error(err);
  }
  e.target.value='';
});

function parseBegegnungenItems(allItems){
  const X_LIGA=105,X_HEIM=177,X_GAST=334,X_STATUS=490;
  const ROMAN={'II':2,'III':3,'IV':4,'V':5,'VI':6,'VII':7,'VIII':8};
  const JUVENILE=/^(U\d+|Mid\b|Midcourt)/i;
  function colOf(x){if(x<X_LIGA)return'date';if(x<X_HEIM)return'liga';if(x<X_GAST)return'heim';if(x<X_STATUS)return'gast';return'status';}
  // Support both .s and .str property names
  function txt(item){return item.s||item.str||'';}
  const rowMap={};
  for(const item of allItems){
    const key=`${item.page}_${Math.round(item.y/4)*4}`;
    rowMap[key]=rowMap[key]||[];
    rowMap[key].push(item);
  }
  const rows=Object.values(rowMap)
    .map(items=>items.sort((a,b)=>a.x-b.x))
    .sort((a,b)=>a[0].page!==b[0].page?a[0].page-b[0].page:a[0].y-b[0].y);
  const matches=[],seen=new Set();
  let curDate='',curTime='';
  for(const row of rows){
    const cols={date:[],liga:[],heim:[],gast:[],status:[]};
    for(const item of row)cols[colOf(item.x)].push(txt(item));
    const dateText=cols.date.join(' ');
    const ligaText=cols.liga.join(' ').trim();
    const heimText=cols.heim.join(' ').replace('[Routenplan]','').trim();
    const gastText=cols.gast.join(' ').replace('[Routenplan]','').trim();
    const statusText=cols.status.join(' ');
    const dm=dateText.match(/(\d{2})\.(\d{2})\.(\d{4})\s+(\d{2}:\d{2})/);
    if(dm){curDate=`${dm[3]}-${dm[2]}-${dm[1]}`;curTime=dm[4];}
    if(!curDate||!ligaText)continue;
    if(JUVENILE.test(ligaText))continue;
    if(!heimText.includes('Reinickendorf')&&!gastText.includes('Reinickendorf'))continue;
    if(statusText.includes('zurückgezogen'))continue;
    const isHome=heimText.includes('Reinickendorf');
    const clubText=isHome?heimText:gastText;
    const opponent=(isHome?gastText:heimText).replace('[Routenplan]','').trim();
    if(!opponent)continue;
    const sm=clubText.match(/e\.V\.\s+(VIII|VII|VI|IV|V|III|II)\s*$/);
    const roman=sm?sm[1]:null;
    const tnum=roman?ROMAN[roman]:1;
    const category=ligaToCategory(ligaText);
    if(!category)continue;
    const catTeams=state.teams.filter(t=>t.category===category).sort((a,b)=>teamNumber(a)-teamNumber(b));
    const matchingTeam=catTeams[tnum-1]||null;
    const dedupKey=`${curDate}_${curTime}_${category}_${tnum}_${opponent}`;
    if(seen.has(dedupKey))continue;
    seen.add(dedupKey);
    matches.push({id:uid(),teamId:matchingTeam?.id||null,teamCategory:category,teamNum:tnum,opponent,date:curDate,time:curTime,home:isHome?'Heim':'Auswärts',venue:'',liga:ligaText,_teamFound:!!matchingTeam});
  }
  return matches;
}
function showMatchesPreview(matches){
  const sec=document.getElementById('matches-preview-section');
  const list=document.getElementById('matches-preview-list');
  if(!matches.length){sec.style.display='none';return;}
  const byCat={};
  for(const m of matches){const k=m.teamCategory||'?';if(!byCat[k])byCat[k]=[];byCat[k].push(m);}
  const unmatched=matches.filter(m=>!m._teamFound).length;
  let html='';
  if(unmatched>0)html+=`<div class="rule-box warn" style="margin-bottom:10px">⚠ ${unmatched} ${tr('noTeamMatch')}</div>`;
  for(const[cat,ms]of Object.entries(byCat)){
    html+=`<div class="card" style="padding:0;overflow:hidden;margin-bottom:8px">
      <div class="team-section-header">${cat} · ${ms.length} Spiele</div>
      ${ms.slice(0,5).map(m=>`<div class="player-row" style="border-radius:0;border:none;border-bottom:1px solid #2e4a4233;margin:0;flex-wrap:wrap">
        <span style="font-size:11px;color:var(--muted);min-width:80px">${fmtDate(m.date)}</span>
        <span style="font-size:11px;color:var(--muted);min-width:42px">${m.time}</span>
        <span class="player-name" style="font-size:12px">${m.opponent.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>
        <span class="team-chip ${m.home==='Heim'?'m':'f'}">${m.home}</span>
        ${!m._teamFound?`<span class="warn-badge">⚠ kein Team</span>`:''}
      </div>`).join('')}
      ${ms.length>5?`<div style="padding:5px 12px;font-size:11px;color:var(--muted)">${T[lang].addedPlayers(ms.length-5)}</div>`:''}
    </div>`;
  }
  list.innerHTML=html;sec.style.display='block';
}

async function confirmMatchesImport(){
  const matches=state._pendingMatches;if(!matches||!matches.length)return;
  const btn=document.querySelector('#matches-preview-section .btn-primary');
  if(btn){btn.textContent='...';btn.disabled=true;}
  setSync('ing',tr('syncIng'));
  try{
    for(const m of matches){
      if(!m.teamId){const t=state.teams.find(x=>x.category===m.teamCategory);if(t)m.teamId=t.id;}
    }
    const toInsert=matches
      .filter(m=>m.teamId&&!state.matches.find(x=>x.date===m.date&&x.teamId===m.teamId&&x.opponent===m.opponent))
      .map(m=>({id:m.id,team_id:m.teamId,opponent:m.opponent,date:m.date,time:m.time,home:m.home,venue:m.venue}));
    if(toInsert.length){for(let i=0;i<toInsert.length;i+=100)await sbUpsert('matches',toInsert.slice(i,i+100));}
    await loadAll();
    document.getElementById('matches-preview-section').style.display='none';
    document.getElementById('matches-parse-status').textContent=T[lang].matchesImportedMsg(toInsert.length);
  }catch(e){setSync('err',tr('syncErr'));console.error(e);}
  finally{if(btn){btn.disabled=false;applyT();}}
}

async function deleteAllMatches(){
  if(!confirm(tr('deleteAllConfirm')))return;
  const statusEl=document.getElementById('matches-parse-status');
  statusEl.textContent='...';
  setSync('ing',tr('syncIng'));
  try{
    for(const m of state.matches)await sbDelete('matches',`id=eq.${m.id}`);
    await loadAll();
    statusEl.textContent=tr('deletedMsg');
  }catch(e){setSync('err',tr('syncErr'));console.error(e);}
}
