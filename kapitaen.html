<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kapitän – Füchse Berlin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --green:#2d6a4f;--green-light:#40916c;--court:#74c69d;
  --white:#f0f2f1;--dark:#161616;--card:#1e1e1e;--muted:#7a8a85;
  --warn:#f4a261;--danger:#c0392b;--info:#4ea8de;--red:#c0392b;
  --border:#252525;--border2:#333
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--white);min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--dark)}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

/* LOGIN */
#login-overlay{position:fixed;inset:0;background:#0d1a10;display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:#1e1e1e;border:1px solid #333;border-radius:14px;padding:36px 32px;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.login-brand{text-align:center;margin-bottom:28px}
.login-brand .name{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.1em;color:var(--court)}
.login-brand .sub{font-size:.7rem;color:#666;letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.login-field{margin-bottom:12px}
.login-field label{font-size:.7rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#666;display:block;margin-bottom:5px}
.login-field input{width:100%;background:#111;border:1px solid #333;border-radius:8px;color:#f0f0f0;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none}
.login-field input:focus{border-color:var(--court)}
.login-btn{width:100%;padding:11px;border-radius:8px;border:none;background:#2d6a4f;color:#fff;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:background .15s}
.login-btn:hover{background:var(--green-light)}
.login-err{margin-top:12px;font-size:.8rem;color:var(--danger);text-align:center;min-height:18px;font-weight:500}

/* HEADER */
header{background:#111;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px}
.logo{display:flex;align-items:center;gap:10px}
.logo h1{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px}
.logo span{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;display:block}
.header-right{display:flex;align-items:center;gap:8px}
.sync-badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;transition:all .3s}
.sync-ok{background:#1a2a1a;border:1px solid var(--court)55;color:var(--court)}
.sync-err{background:#3d1a1a;border:1px solid var(--danger)55;color:var(--danger)}
.sync-ing{background:#2e2a1a;border:1px solid var(--warn)55;color:var(--warn)}
.lang-bar{display:flex;gap:4px}
.lang-btn{padding:3px 9px;font-size:11px;font-weight:600;border:1px solid var(--border2);border-radius:6px;cursor:pointer;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .15s}
.lang-btn:hover{color:var(--white)}
.lang-btn.active{background:var(--green-light);color:#fff;border-color:var(--green-light)}
.logout-btn{padding:4px 12px;font-size:11px;font-weight:600;border:1px solid var(--border2);border-radius:6px;cursor:pointer;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif}
.logout-btn:hover{color:var(--white);border-color:#555}

/* LAYOUT */
main{padding:22px;max-width:1080px;margin:0 auto;display:grid;grid-template-columns:240px 1fr;gap:18px;min-height:calc(100vh - 60px)}
@media(max-width:700px){main{grid-template-columns:1fr}}

/* SIDEBAR */
.sidebar{display:flex;flex-direction:column;gap:10px}
.sidebar-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
.sidebar-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.team-btn{width:100%;text-align:left;padding:8px 10px;border-radius:8px;border:1px solid transparent;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px;margin-bottom:3px}
.team-btn:hover{background:#252525;color:var(--white)}
.team-btn.active{background:#1a2e26;border-color:var(--court)55;color:var(--court)}
.team-dot{width:7px;height:7px;border-radius:50%;background:var(--court);flex-shrink:0;opacity:.5}
.team-btn.active .team-dot{opacity:1}

/* MAIN CONTENT */
.content{min-width:0}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--court);margin-bottom:4px}
.section-sub{color:var(--muted);font-size:12px;margin-bottom:16px}

/* MATCH LIST */
.match-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px 16px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.match-card:hover{border-color:var(--court)44}
.match-card.active{border-color:var(--court);background:#1a2e26}
.match-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.match-title{font-weight:600;font-size:14px}
.match-meta{font-size:11px;color:var(--muted);margin-top:2px}
.match-status{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px}
.status-ready{background:#1a2e26;color:var(--court)}
.status-open{background:#2e2a1a;color:var(--warn)}
.prog-bar{height:4px;background:#252525;border-radius:2px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;background:var(--court);border-radius:2px;transition:width .3s}

/* AVAILABILITY PANEL */
.avail-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-top:14px}
.avail-panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.avail-panel-title{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--court)}
.auto-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1px solid var(--court)55;background:#1a2e26;color:var(--court);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.auto-btn:hover{background:var(--green);border-color:var(--green);color:#fff}
.avail-group-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:5px 0 3px;border-top:1px solid var(--border);margin-top:4px;color:var(--muted)}
.avail-group-label:first-child{border-top:none;margin-top:0}
.avail-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)22}
.avail-row:last-child{border-bottom:none}
.avail-avatar{width:30px;height:30px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.avail-name{flex:1;font-size:13px;font-weight:500}
.avail-meta{font-size:11px;color:var(--muted)}
.avail-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px}
.av-yes{background:#1a2e26;color:var(--court)}
.av-maybe{background:#2e2a1a;color:var(--warn)}
.av-no{background:#2d1a1a;color:var(--danger)}
.av-open{background:#252525;color:var(--muted)}

/* LINEUP */
.lineup-section{margin-top:18px}
.lineup-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.lineup-slot{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;border:1px solid var(--border);margin-bottom:6px;background:#181818}
.lineup-slot.ok{border-color:var(--court)33}
.lineup-slot.warning{border-color:var(--danger)55;background:#2d151522}
.lineup-slot.blocked-slot{border-color:var(--danger);background:#2d1a1a}
.lineup-pos{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--court);min-width:20px;text-align:center}
.lineup-slot select{flex:1;background:#111;border:1px solid var(--border2);border-radius:6px;color:var(--white);padding:5px 8px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none}
.lineup-slot select:focus{border-color:var(--court)}
.save-indicator{font-size:11px;color:var(--court);text-align:right;margin-top:4px;min-height:16px}
.blocked-badge{font-size:10px;background:#2d1a1a;border:1px solid var(--danger)44;color:var(--danger);padding:2px 7px;border-radius:10px}
.warn-banner{background:#3d1a1a;border:1px solid var(--danger)44;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:var(--danger)}
.ok-banner{background:#1a2d22;border:1px solid var(--court)33;border-radius:8px;padding:6px 12px;margin-bottom:10px;font-size:12px;color:var(--court)}
.empty{color:var(--muted);font-size:13px;text-align:center;padding:30px}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--court)44;border-top-color:var(--court);border-radius:50%;animation:spin .6s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
input,select{background:#111;border:1px solid var(--border2);border-radius:7px;color:var(--white);padding:7px 10px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;width:100%}
input:focus,select:focus{border-color:var(--court)}
.rule-box{background:#181818;border-left:3px solid var(--court);border-radius:0 8px 8px 0;padding:8px 12px;margin:9px 0;font-size:12px;color:var(--muted);line-height:1.6}
.rule-box.warn{border-left-color:var(--warn)}
.rule-box.danger{border-left-color:var(--danger)}
.rule-box strong{color:var(--white)}

/* Drag & drop lineup slots */
.lineup-slot[draggable]{cursor:grab}
.lineup-slot[draggable]:active{cursor:grabbing}
.lineup-slot.drag-over{border-color:var(--court)!important;background:rgba(116,198,157,.1)!important;transform:scale(1.02)}
.lineup-slot.dragging{opacity:.4}
.drag-handle{color:var(--muted);font-size:14px;cursor:grab;padding:0 4px;user-select:none;flex-shrink:0}
.drag-handle:hover{color:var(--court)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-overlay">
  <div class="login-box">
    <div class="login-brand">
      <div class="name">FÜCHSE BERLIN</div>
      <div class="sub">Kapitän-App</div>
    </div>
    <div class="login-field">
      <label>Email</label>
      <input id="login-email" type="email" autocomplete="email" placeholder="email@fuechse-berlin-reinickendorf.de"
        onkeydown="if(event.key==='Enter')document.getElementById('login-pass').focus()">
    </div>
    <div class="login-field" style="margin-bottom:20px">
      <label>Passwort</label>
      <input id="login-pass" type="password" autocomplete="current-password" placeholder="••••••••"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">Einloggen</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">
    <div>
      <h1>FÜCHSE BERLIN</h1>
      <span>Kapitän-App</span>
    </div>
  </div>
  <div class="header-right">
    <div class="lang-bar">
      <button class="lang-btn active" onclick="setLang('de')">DE</button>
      <button class="lang-btn" onclick="setLang('es')">ES</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
    <span class="sync-badge sync-ing" id="sync-badge">⟳</span>
    <button class="logout-btn" id="btn-logout" onclick="doLogout()">Abmelden</button>
  </div>
</header>

<!-- TABS -->
<div style="display:flex;padding:0 22px;background:#111;border-bottom:1px solid var(--border2);overflow-x:auto">
  <button id="tab-spiele" onclick="showKapTab('spiele')" style="padding:11px 18px;font-size:13px;font-weight:500;color:var(--court);cursor:pointer;border-bottom:3px solid var(--court);border-top:none;border-left:none;border-right:none;background:none;font-family:'DM Sans',sans-serif;white-space:nowrap">Spiele &amp; Aufstellung</button>
  <button id="tab-overview" onclick="showKapTab('overview')" style="padding:11px 18px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;border-top:none;border-left:none;border-right:none;background:none;font-family:'DM Sans',sans-serif;white-space:nowrap">Overview</button>
  <button id="tab-sperren" onclick="showKapTab('sperren')" style="padding:11px 18px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;border-top:none;border-left:none;border-right:none;background:none;font-family:'DM Sans',sans-serif;white-space:nowrap">Sperren</button>
</div>

<!-- MAIN -->
<main>
  <!-- SIDEBAR: Team list -->
  <div class="sidebar" id="main-sidebar">
    <div class="sidebar-card">
      <div class="sidebar-title" id="sidebar-teams-title">Mannschaften</div>
      <div id="team-list-sidebar"><div class="empty" style="padding:10px" id="sidebar-loading">Laden...</div></div>
    </div>
  </div>

  <!-- CONTENT WRAPPER (single grid cell, tabs switch between views inside) -->
  <div style="min-width:0" id="main-content-wrapper">
    <!-- CONTENT: Spiele & Aufstellung -->
    <div id="view-spiele">
    <div id="no-team-selected" class="empty" style="margin-top:60px">
      &#8592; Mannschaft auswählen
    </div>
    <div id="team-content" style="display:none">
      <div class="section-title" id="content-team-name"></div>
      <div class="section-sub" id="content-team-meta"></div>

      <!-- Match list -->
      <div id="match-list"></div>

      <!-- Availability + Lineup panel -->
      <div id="avail-panel" style="display:none" class="avail-panel">
        <div class="avail-panel-header">
          <div>
            <div class="avail-panel-title" id="panel-match-title"></div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px" id="panel-match-meta"></div>
          </div>
          <div style="display:flex;gap:6px">
            <button class="auto-btn" id="auto-btn" onclick="runAutoLineup()">&#9889; Auto-Aufstellung</button>
            <button class="auto-btn" id="sort-btn" onclick="sortLineupKap()" style="background:transparent;border-color:var(--court)44;color:var(--muted)">↕ Sort</button>
          </div>
        </div>

        <!-- Lineup FIRST (above availability) -->
        <div class="lineup-section" style="margin-top:0;margin-bottom:18px">
          <div class="lineup-title" id="lineup-label">Aufstellung</div>
          <div id="lineup-warnings"></div>
          <div id="lineup-slots"></div>
          <div class="save-indicator" id="save-indicator"></div>
        </div>

        <!-- Divider -->
        <div style="border-top:1px solid var(--border);margin-bottom:14px"></div>

        <!-- Availability table BELOW -->
        <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Verfügbarkeit</div>
        <div id="avail-list"></div>
      </div>
    </div>
    </div>

    <!-- CONTENT: Overview -->
    <div id="view-overview" style="display:none">
      <div class="section-title">Overview</div>
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;position:relative;z-index:200">
        <!-- Multi-select dropdown: shown in both Spiele and Spieler modes -->
        <div id="kap-ov-multicat" style="position:relative">
          <button id="kap-ov-multicat-btn" onclick="toggleMultiCat(event)" style="padding:5px 10px;font-size:12px;background:#111;border:1px solid var(--border2);border-radius:8px;color:var(--white);font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap">
            <span id="kap-ov-multicat-label" style="font-size:12px;white-space:nowrap">Alle Kategorien</span>
            <span style="font-size:9px;color:var(--muted)">▼</span>
          </button>
        </div>
        <div id="kap-ov-sort-wrap" style="position:relative">
          <button id="kap-ov-sort-btn" onclick="toggleSortMenu(event)" style="padding:5px 10px;font-size:12px;background:#111;border:1px solid var(--border2);border-radius:8px;color:var(--white);font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap">
            <span id="kap-ov-sort-label" style="font-size:12px;white-space:nowrap">Nach Mannschaftsnummer</span>
            <span style="font-size:9px;color:var(--muted)">▼</span>
          </button>
        </div>
        <div style="display:flex;gap:4px;margin-left:auto">
          <button id="kap-ov-btn-matches" onclick="setKapOverviewMode('matches')"
            style="padding:4px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid var(--court);background:var(--court);color:#0d1a10">📋 Spiele</button>
          <button id="kap-ov-btn-players" onclick="setKapOverviewMode('players')"
            style="padding:4px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid var(--border2);background:transparent;color:var(--muted)">👥 Spieler</button>
        </div>
      </div>
      <div id="kap-overview-content" style="overflow-x:auto"></div>
    </div>

    <!-- CONTENT: Sperren (read-only) -->
    <div id="view-sperren" style="display:none">
      <div class="section-title" id="sperren-title">Sperren</div>
      <div class="section-sub" id="sperren-sub">Übersicht der gesperrten Spieler nach Stammkader- und Stammmannschaftsregel</div>
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
        <select id="block-cat-filter" onchange="renderBlocking()" style="width:auto;font-size:12px;padding:5px 9px;background:#111;border:1px solid var(--border2);border-radius:8px;color:var(--white);font-family:'DM Sans',sans-serif;outline:none"></select>
      </div>
      <div id="blocking-content"><div class="empty" id="blocking-loading">Laden...</div></div>
    </div>
  </div>
</main>

<script>
const SB_URL='https://kepbpcttbvkbcckqoecv.supabase.co';
const SB_KEY='sb_publishable_wDzLASMHgyEcQh8RPmfPRA_HfJotf-n';

let _sbClient=null;
let _session=null;

// ── AUTH ──
(function(){
  const s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
  s.onload=async function(){
    _sbClient=window.supabase.createClient(SB_URL,SB_KEY);
    const {data:{session}}=await _sbClient.auth.getSession();
    if(session){
      _session=session;
      document.getElementById('login-overlay').style.display='none';
      loadAll();
    }
    _sbClient.auth.onAuthStateChange((event,session)=>{
      _session=session;
      if(event==='SIGNED_OUT'){location.reload();}
    });
  };
  document.head.appendChild(s);
})();


// ── LOGIN RATE LIMITING ──
const _rl={attempts:0,lockedUntil:0};
function _rlCheck(errEl){
  const now=Date.now();
  if(_rl.lockedUntil>now){
    const secs=Math.ceil((_rl.lockedUntil-now)/1000);
    errEl.textContent=`Zu viele Versuche. Bitte ${secs}s warten.`;
    return false;
  }
  return true;
}
function _rlFail(errEl){
  _rl.attempts++;
  const timeout=_rl.attempts>=5?5*60*1000*(_rl.attempts-4):0;
  if(timeout>0){
    _rl.lockedUntil=Date.now()+timeout;
    const mins=Math.ceil(timeout/60000);
    errEl.textContent=`Zu viele Versuche. ${mins} Minute${mins>1?'n':''} gesperrt.`;
  } else {
    errEl.textContent='Falscher Benutzer oder Passwort';
  }
  setTimeout(()=>{if(Date.now()>=_rl.lockedUntil)errEl.textContent='';},3500);
}
function _rlSuccess(){_rl.attempts=0;_rl.lockedUntil=0;}

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const err=document.getElementById('login-err');
  const btn=document.getElementById('login-btn');
  if(!_rlCheck(err))return;
  err.textContent='';btn.textContent='...';btn.disabled=true;
  const {data,error}=await _sbClient.auth.signInWithPassword({email,password:pass});
  btn.textContent='Einloggen';btn.disabled=false;
  if(error){
    _rlFail(err);
    document.getElementById('login-pass').value='';
  } else {
    _rlSuccess();
    _session=data.session;
    document.getElementById('login-overlay').style.display='none';
    loadAll();
  }
}

async function doLogout(){
  await _sbClient.auth.signOut();
}

// ── API ──
function getHDR(){
  const token=_session?.access_token||SB_KEY;
  return{'apikey':SB_KEY,'Authorization':'Bearer '+token,'Content-Type':'application/json'};
}
async function sbGet(t,p=''){
  const r=await fetch(`${SB_URL}/rest/v1/${t}?${p}`,{headers:{...getHDR(),'Prefer':''}});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function sbUpsert(t,d){
  const r=await fetch(`${SB_URL}/rest/v1/${t}`,{method:'POST',headers:{...getHDR(),'Prefer':'resolution=merge-duplicates'},body:JSON.stringify(Array.isArray(d)?d:[d])});
  if(!r.ok)throw new Error(await r.text());
}

// ── HELPERS ──
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
function initials(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
function fmtDate(d){if(!d)return'';const[y,m,day]=d.split('-');return`${day}.${m}.${y}`}
function teamById(id){return state.teams.find(t=>t.id===id)}
function playerById(id){return state.players.find(p=>p.id===id)}
function teamSize(t){return t&&(t.is_4er||t.season==='Winter')?4:6}
function catGender(cat){if(!cat)return'M';return cat.toLowerCase().startsWith('damen')?'F':'M'}
function teamNumber(team){
  const n=parseInt(team.teamNumber||team.team_number||0);
  if(n>0&&n<10)return n;
  const roman={I:1,II:2,III:3,IV:4,V:5,VI:6,VII:7,VIII:8};
  const r=team.name.match(/\b(VIII|VII|VI|IV|V|III|II)\b/);
  if(r)return roman[r[1]]||1;
  return 1;
}
function playerRankInTeam(playerId,teamId){
  const team=teamById(teamId);if(!team)return 999;
  const cat=team.category;
  const catTeams=state.teams.filter(t=>t.category===cat).sort((a,b)=>teamNumber(a)-teamNumber(b));
  // Use the rank from the first team in the category where the player has a rank entry
  // This is the player's global position in the Namentliche Mannschaftsmeldung for this category
  const playerRanks=state.rankByTeam[playerId]||{};
  for(const t of catTeams){const r=playerRanks[t.id];if(r!=null)return r;}
  return playerById(playerId)?.rank||999;
}
function lkExceedsTeam(playerId,teamId){
  // LK > 20 rule: in Herren category, players with LK > 20 can only play in team #3+
  const team=teamById(teamId);if(!team)return false;
  if(team.category!=='Herren')return false;
  const p=playerById(playerId);if(!p)return false;
  return(p.lk||0)>20&&teamNumber(team)<3;
}
function isPlayerBlockedForTeam(playerId,teamId){
  if(lkExceedsTeam(playerId,teamId))return true;
  const team=teamById(teamId);if(!team)return false;
  const status=getPlayerBlockStatus(playerId,team.category);
  return status.blocked.some(b=>b.id===teamId);
}
// For lineup display only — ignores LK>20 rule, only shows real Stammkader/SM blocks
function isPlayerBlockedForLineup(playerId,teamId){
  const team=teamById(teamId);if(!team)return false;
  const status=getPlayerBlockStatus(playerId,team.category);
  return status.blocked.some(b=>b.id===teamId);
}
function getStammkaderTeam(playerId,catGroup){
  const catTeams=state.teams.filter(t=>t.category===catGroup).sort((a,b)=>teamNumber(a)-teamNumber(b));
  if(!catTeams.length)return null;
  const p=playerById(playerId);
  const rankInCat=p?.rank??null;
  if(rankInCat==null)return null;
  let remaining=rankInCat;
  for(const t of catTeams){const gs=teamSize(t);if(remaining<=gs)return t;remaining-=gs;}
  return catTeams[catTeams.length-1];
}
function getPlayerBlockStatus(playerId,catGroup){
  const counts=state.matchCounts[playerId]||{};
  const catTeams=state.teams.filter(t=>t.category===catGroup).sort((a,b)=>teamNumber(a)-teamNumber(b));
  const stammkaderTeam=getStammkaderTeam(playerId,catGroup);
  const stammkaderTeamNum=stammkaderTeam?teamNumber(stammkaderTeam):null;
  const stammkaderBlocked=stammkaderTeamNum!==null?catTeams.filter(t=>teamNumber(t)>stammkaderTeamNum):[];
  const stammmannschaftBlocked=[],stammmannschaftWarned=[];
  for(const t of catTeams){
    const tNum=teamNumber(t);
    const sup=catTeams.filter(s=>teamNumber(s)<tNum).reduce((sum,s)=>sum+(counts[s.id]||0),0);
    if(sup>=2)stammmannschaftBlocked.push(t);
    else if(sup===1)stammmannschaftWarned.push(t);
  }
  const allBlockedIds=new Set([...stammkaderBlocked.map(t=>t.id),...stammmannschaftBlocked.map(t=>t.id)]);
  return{stammkaderTeam,stammkaderBlocked,stammmannschaftBlocked,stammmannschaftWarned,blocked:catTeams.filter(t=>allBlockedIds.has(t.id)),warned:stammmannschaftWarned};
}

// ── STATE ──
let state={teams:[],players:[],matches:[],availability:{},lineups:{},matchCounts:{},rankByTeam:{},mainTeam:{}};
let selectedTeamId=null;
let selectedMatchId=null;

// ── LOAD ──
async function loadAll(){
  setSync('ing','⟳');
  try{
    const[teams,players,matches,avRows,lineupRows,countRows]=await Promise.all([
      sbGet('teams','order=category,team_number'),
      sbGet('players','order=lk'),
      sbGet('matches','order=date'),
      sbGet('availability',''),
      sbGet('lineups',''),
      sbGet('player_match_counts','')
    ]);
    state.teams=teams.map(t=>({id:t.id,name:t.name,liga:t.liga,season:t.season,is_4er:t.is_4er||false,category:t.category||'Herren',teamNumber:t.team_number||1,gender:t.gender||catGender(t.category)}));
    state.players=players.map(p=>({id:p.id,name:p.name,idnr:p.idnr,lk:p.lk,lkStr:p.lk_str,year:p.year,teamIds:[],gender:p.gender||'M',rank:p.rank}));
    state.matches=matches.map(m=>({id:m.id,teamId:m.team_id,opponent:m.opponent,date:m.date,time:m.time,home:m.home,venue:m.venue}));
    state.availability={};
    for(const r of avRows){if(!state.availability[r.match_id])state.availability[r.match_id]={};state.availability[r.match_id][r.player_id]=r.status;}
    state.lineups={};
    for(const r of lineupRows)state.lineups[r.match_id]=r.slots;
    state.matchCounts={};
    for(const r of countRows){if(!state.matchCounts[r.player_id])state.matchCounts[r.player_id]={};state.matchCounts[r.player_id][r.team_id]=r.matches_played;}
    // Load player_teams paginated
    let ptRows=[],ptOffset=0;
    while(true){
      const batch=await sbGet('player_teams',`limit=1000&offset=${ptOffset}`);
      ptRows=ptRows.concat(batch);
      if(batch.length<1000)break;
      ptOffset+=1000;
    }
    state.rankByTeam={};
    state.mainTeam={};
    for(const r of ptRows){
      const p=state.players.find(x=>x.id===r.player_id);
      if(p&&!p.teamIds.includes(r.team_id))p.teamIds.push(r.team_id);
      if(r.rank!=null){if(!state.rankByTeam[r.player_id])state.rankByTeam[r.player_id]={};state.rankByTeam[r.player_id][r.team_id]=r.rank;}
      if(r.is_mainteam){if(!state.mainTeam[r.player_id])state.mainTeam[r.player_id]={};state.mainTeam[r.player_id][r.team_id]=true;}
    }
    setSync('ok','● sync');
    buildMultiCatList();
    _kapOvSelectedCats=null;
    renderTeamSidebar();
    if(selectedTeamId)renderTeamContent();
    if(selectedMatchId)renderAvailPanel();
  }catch(e){setSync('err','✕ offline');console.error(e);}
}

// ── SIDEBAR ──
function renderTeamSidebar(){
  const byCat={};
  for(const t of state.teams){
    const c=t.category||'Herren';
    if(!byCat[c])byCat[c]=[];
    byCat[c].push(t);
  }
  let html='';
  for(const[cat,teams] of Object.entries(byCat)){
    html+=`<div style="font-size:10px;font-weight:600;color:#444;text-transform:uppercase;letter-spacing:.5px;margin:10px 0 4px;padding-left:4px">${cat}</div>`;
    for(const t of teams.sort((a,b)=>teamNumber(a)-teamNumber(b))){
      const matches=state.matches.filter(m=>m.teamId===t.id);
      const active=selectedTeamId===t.id?'active':'';
      html+=`<button class="team-btn ${active}" onclick="selectTeam('${t.id}')">
        <span class="team-dot"></span>
        <span style="flex:1">${t.name}</span>
        <span style="font-size:10px;color:#444">${matches.length}</span>
      </button>`;
    }
  }
  document.getElementById('team-list-sidebar').innerHTML=html||'<div class="empty" style="padding:10px">Keine Teams</div>';
}

// ── TEAM SELECTION ──
function selectTeam(teamId){
  selectedTeamId=teamId;
  selectedMatchId=null;
  document.getElementById('no-team-selected').style.display='none';
  document.getElementById('team-content').style.display='block';
  document.getElementById('avail-panel').style.display='none';
  renderTeamSidebar();
  renderTeamContent();
}

function renderTeamContent(){
  const team=teamById(selectedTeamId);if(!team)return;
  document.getElementById('content-team-name').textContent=team.name;
  document.getElementById('content-team-meta').textContent=`${team.liga} · ${team.season} · ${teamSize(team)} Spieler`;
  const matches=[...state.matches.filter(m=>m.teamId===selectedTeamId)].sort((a,b)=>a.date.localeCompare(b.date));
  if(!matches.length){
    document.getElementById('match-list').innerHTML='<div class="empty">Keine Spiele für diese Mannschaft</div>';
    return;
  }
  document.getElementById('match-list').innerHTML=matches.map(m=>{
    const avail=state.availability[m.id]||{};
    const tp=state.players.filter(p=>p.teamIds.includes(m.teamId));
    const yes=tp.filter(p=>avail[p.id]==='yes').length;
    const pct=tp.length>0?Math.round(yes/tp.length*100):0;
    const _lineupTeam=teamById(m.teamId);
    const _lineupSize=teamSize(_lineupTeam);
    const _slots=state.lineups[m.id]||[];
    const hasLineup=_slots.slice(0,_lineupSize).filter(Boolean).length>=_lineupSize;
    const isActive=selectedMatchId===m.id;
    return`<div class="match-card ${isActive?'active':''}" onclick="selectMatch('${m.id}')">
      <div class="match-header">
        <div>
          <div class="match-title">${team.name} vs ${(m.opponent||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>
          <div class="match-meta">📅 ${fmtDate(m.date)} · ${m.time} · ${m.home}</div>
        </div>
        <span class="match-status ${hasLineup?'status-ready':'status-open'}">${hasLineup?'✓ Aufstellung':'⏳ offen'}</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">${yes}/${tp.length} verfügbar</div>
    </div>`;
  }).join('');
}

// ── MATCH SELECTION ──
function selectMatch(matchId){
  selectedMatchId=matchId;
  renderTeamContent(); // re-render to highlight active match
  renderAvailPanel();
  document.getElementById('avail-panel').style.display='block';
  document.getElementById('avail-panel').scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ── AVAILABILITY PANEL ──
function renderAvailPanel(){
  const match=state.matches.find(m=>m.id===selectedMatchId);if(!match)return;
  const team=teamById(match.teamId);
  document.getElementById('panel-match-title').textContent=`${team?.name||'?'} vs ${match.opponent}`;
  document.getElementById('panel-match-meta').textContent=`${fmtDate(match.date)} · ${match.time} · ${match.home}`;
  document.getElementById('lineup-label').textContent=`Aufstellung (${teamSize(team)} Einzel)`;

  const avail=state.availability[selectedMatchId]||{};
  const tp=[...state.players.filter(p=>p.teamIds.includes(match.teamId))].sort((a,b)=>{
    const order={yes:0,conditional:1,notfall:2,'':3,no:4};
    const ao=order[avail[a.id]||'']??3, bo=order[avail[b.id]||'']??3;
    if(ao!==bo)return ao-bo;
    return playerRankInTeam(a.id,match.teamId)-playerRankInTeam(b.id,match.teamId);
  });

  const groupLabel={yes:tr('groupYes'),conditional:tr('groupConditional'),notfall:tr('groupNotfall'),no:tr('groupNo'),'':tr('groupNone')};
  const groupColor={yes:'var(--court)',conditional:'#52c97a',notfall:'var(--warn)',no:'var(--danger)','':'var(--muted)'};
  let lastGroup=undefined;
  let html='';
  for(const p of tp){
    const s=avail[p.id]||'';
    const blocked=isPlayerBlockedForLineup(p.id,match.teamId);
    if(s!==lastGroup){
      lastGroup=s;
      html+=`<div class="avail-group-label" style="color:${groupColor[s]}">${groupLabel[s]}</div>`;
    }
    const isMainTeam=!!(state.mainTeam[p.id]?.[match.teamId]);
    html+=`<div class="avail-row">
      <div class="avail-avatar" style="${isMainTeam?'background:rgba(212,160,23,.25);border:1.5px solid #d4a017':''}">${initials(p.name)}</div>
      <div style="flex:1">
        <div class="avail-name">${p.name}${isMainTeam?` <span style="font-size:10px;font-weight:700;color:#d4a017;border:1px solid #d4a01766;background:rgba(212,160,23,.1);padding:1px 6px;border-radius:8px">★ SM</span>`:''}${blocked?` <span class="blocked-badge">⛔</span>`:''}</div>
        <div class="avail-meta">${p.lkStr||''} · Jg. ${p.year||'—'} · Rang ${playerRankInTeam(p.id,match.teamId)<999?playerRankInTeam(p.id,match.teamId):'—'}</div>
      </div>
      ${(()=>{
        let badgeLabel=s==='yes'?tr('badgeYes'):s==='notfall'?tr('badgeNotfall'):s==='no'?tr('badgeNo'):'—';
        let extraBadge='';
        if(s==='conditional'){
          const yesMatch=state.matches.find(om=>om.id!==match.id&&om.date===match.date&&state.availability[om.id]?.[p.id]==='yes');
          const yesTeam=yesMatch?teamById(yesMatch.teamId):null;
          badgeLabel=yesTeam?`(Ja → ${yesTeam.name})`:'(Ja)';
          // Check if the Ja-match is full and player is NOT in lineup there
          if(yesMatch&&yesTeam){
            const ySz=teamSize(yesTeam);
            const ySlots=state.lineups[yesMatch.id]||[];
            const yMain=ySlots.slice(0,ySz);
            const yFull=yMain.filter(Boolean).length>=ySz;
            const yErsatz=ySlots[ySz]||null;
            const inYLineup=yMain.includes(p.id)||yErsatz===p.id;
            if(yFull&&!inYLineup){
              const freiTitle=lang==='de'?`Aufstellung von ${yesTeam.name} ist voll, Spieler nicht aufgestellt — frei für dieses Spiel`:lang==='es'?`La alineación de ${yesTeam.name} está completa, jugador no alineado — libre para este partido`:`${yesTeam.name} lineup is full, player not in lineup — free for this match`;
              extraBadge=`<span title="${freiTitle}" style="background:#2a2a2a;color:#bbb;border-radius:10px;padding:2px 8px;font-size:10px;font-weight:700;letter-spacing:.5px;margin-left:4px;cursor:help">FREI</span>`;
            }
          }
        }
        const bg=s==='yes'?'#1a2e26':s==='conditional'?'rgba(82,201,122,.1)':s==='notfall'?'#2e2a1a':s==='no'?'#2d1a1a':'#252525';
        const col=s==='yes'?'var(--court)':s==='conditional'?'#52c97a':s==='notfall'?'var(--warn)':s==='no'?'var(--danger)':'var(--muted)';
        return`<span class="avail-badge" style="background:${bg};color:${col};border-radius:10px;padding:2px 8px;font-size:11px;font-weight:600">${badgeLabel}</span>${extraBadge}`;
      })()}
    </div>`;
  }
  document.getElementById('avail-list').innerHTML=html;
  renderLineupSlots();
}

// ── LINEUP ──
// ── DRAG & DROP LINEUP ──
let _dragSrcIndex=null;
function onSlotDragStart(e,index){
  _dragSrcIndex=index;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',index);
}
function onSlotDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.classList.add('drag-over');
}
function onSlotDragLeave(e){
  e.currentTarget.classList.remove('drag-over');
}
function onSlotDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.lineup-slot').forEach(s=>s.classList.remove('drag-over'));
  _dragSrcIndex=null;
}
async function onSlotDrop(e,destIndex){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(_dragSrcIndex===null||_dragSrcIndex===destIndex)return;
  const lineup=state.lineups[selectedMatchId]||[];
  const match=state.matches.find(m=>m.id===selectedMatchId);if(!match)return;
  const size=teamSize(teamById(match.teamId));
  // Swap the two slots
  const newLineup=[...lineup];
  while(newLineup.length<=Math.max(_dragSrcIndex,destIndex))newLineup.push(null);
  [newLineup[_dragSrcIndex],newLineup[destIndex]]=[newLineup[destIndex],newLineup[_dragSrcIndex]];
  state.lineups[selectedMatchId]=newLineup;
  document.getElementById('save-indicator').innerHTML='<span class="spinner"></span>Speichern...';
  try{
    await sbUpsert('lineups',[{match_id:selectedMatchId,slots:newLineup}]);
    document.getElementById('save-indicator').textContent='✓ Gespeichert';
    setTimeout(()=>document.getElementById('save-indicator').textContent='',2000);
  }catch(e){console.error(e);}
  renderLineupSlots();
}

function renderLineupSlots(){
  const match=state.matches.find(m=>m.id===selectedMatchId);if(!match)return;
  const team=teamById(match.teamId);
  const size=teamSize(team);
  const avail=state.availability[selectedMatchId]||{};
  const allTp=[...state.players.filter(p=>p.teamIds.includes(match.teamId))].sort((a,b)=>playerRankInTeam(a.id,match.teamId)-playerRankInTeam(b.id,match.teamId));
  const lineup=state.lineups[selectedMatchId]||[];

  // LK-order warnings (same logic as admin renderLineup)
  const warnings=[];
  for(let i=0;i<size-1;i++){
    const p1=lineup[i]?playerById(lineup[i]):null;
    const p2=lineup[i+1]?playerById(lineup[i+1]):null;
    if(p1&&p2&&playerRankInTeam(p1.id,match.teamId)>playerRankInTeam(p2.id,match.teamId))
      warnings.push(`⚠️ Pos. ${i+1} (Rang ${playerRankInTeam(p1.id,match.teamId)}) vor Pos. ${i+2} (Rang ${playerRankInTeam(p2.id,match.teamId)})`);

  }
  const blockedWarnings=lineup.filter(Boolean).map(pid=>{
    const p=playerById(pid);if(!p)return null;
    if(isPlayerBlockedForLineup(pid,match.teamId))return tr('isBlocked')(p.name,team?.name||'?');
    return null;
  }).filter(Boolean);

  const filledCount=lineup.slice(0,size).filter(Boolean).length;
  let warnHtml='';
  if(blockedWarnings.length)warnHtml+=`<div class="warn-banner">${blockedWarnings.join('<br>')}</div>`;
  if(warnings.length)
    warnHtml+=`<div class="warn-banner">${warnings.join('<br>')}</div>`;
  if(!blockedWarnings.length&&!warnings.length){
    if(filledCount>=size)
      warnHtml=`<div class="ok-banner">✓ Aufstellung vollständig</div>`;
    else if(filledCount>0)
      warnHtml+=`<div style="background:#2d2215;border:1px solid var(--warn)44;border-radius:8px;padding:6px 12px;margin-bottom:10px;font-size:12px;color:var(--warn)">⏳ Aufstellung unvollständig (${filledCount}/${size})</div>`;
  }
  document.getElementById('lineup-warnings').innerHTML=warnHtml;

  // Slots — sorted by availability then rank, with group separators (same as admin)
  const _ao2={yes:0,conditional:1,notfall:2,'':3,no:4};
  const sorted=[...allTp].sort((a,b)=>{
    const ao=_ao2[avail[a.id]||'']??2, bo=_ao2[avail[b.id]||'']??2;
    if(ao!==bo)return ao-bo;
    return playerRankInTeam(a.id,match.teamId)-playerRankInTeam(b.id,match.teamId);
  });

  const _gl2={yes:tr('dropYes'),conditional:tr('dropConditional'),notfall:tr('dropNotfall'),no:tr('dropNo'),'':tr('dropNone')};
  function buildOpts(selectedPid){
    let opts='<option value="">—</option>';let _lgu=undefined;
    for(const tp of sorted){
      const bl=isPlayerBlockedForLineup(tp.id,match.teamId);const grp=avail[tp.id]||'';
      let sep='';if(grp!==_lgu){_lgu=grp;sep=`<option disabled style="color:var(--muted);font-size:10px">${_gl2[grp]}</option>`;}
      opts+=sep+`<option value="${tp.id}" ${selectedPid===tp.id?'selected':''}>${bl?'⛔ ':''}${tp.name} (${tp.lkStr}) ${avail[tp.id]==='yes'?'✓':avail[tp.id]==='no'?'✗':'?'} ${tp.year||''}</option>`;
    }
    return opts;
  }
  let slotsHtml='';
  for(let i=0;i<size;i++){
    const pid=lineup[i]||'';
    const p=pid?playerById(pid):null;
    const prev=i>0&&lineup[i-1]?playerById(lineup[i-1]):null;
    const rankOk=!p||!prev||playerRankInTeam(p.id,match.teamId)>=playerRankInTeam(prev.id,match.teamId);
    const isBlocked=pid?isPlayerBlockedForLineup(pid,match.teamId):false;
    const cls=p?(isBlocked?'blocked-slot':rankOk?'ok':'warning'):'';
    slotsHtml+=`<div class="lineup-slot ${cls}" draggable="true" data-slot-index="${i}"
      ondragstart="onSlotDragStart(event,${i})"
      ondragover="onSlotDragOver(event)"
      ondragleave="onSlotDragLeave(event)"
      ondrop="onSlotDrop(event,${i})"
      ondragend="onSlotDragEnd(event)">
      <span class="drag-handle" title="Ziehen zum Umsortieren">⠿</span>
      <div class="lineup-pos">${i+1}</div>
      <select onchange="setSlot(${i},this.value)">${buildOpts(pid)}</select>
    </div>`;
  }

  // Ersatz slot
  const ersatzPid=lineup[size]||'';
  const ersatzP=ersatzPid?playerById(ersatzPid):null;
  const ersatzBlocked=ersatzPid?isPlayerBlockedForLineup(ersatzPid,match.teamId):false;
  let ersatzWarn='';
  if(ersatzPid){
    const otherLineup=state.matches.find(om=>om.id!==selectedMatchId&&om.date===match.date&&(state.lineups[om.id]||[]).slice(0,teamSize(teamById(om.teamId))).includes(ersatzPid));
    const otherErsatz=state.matches.find(om=>om.id!==selectedMatchId&&om.date===match.date&&(state.lineups[om.id]||[])[teamSize(teamById(om.teamId))]===ersatzPid);
    if(otherLineup){const ot=teamById(otherLineup.teamId);ersatzWarn=`⚠ Bereits Aufstellung: <strong>${ot?.name||'?'}</strong>`;}
    else if(otherErsatz){const ot=teamById(otherErsatz.teamId);ersatzWarn=`⚠ Bereits Ersatz: <strong>${ot?.name||'?'}</strong>`;}
  }
  slotsHtml+=`<div style="margin-top:12px;padding-top:10px;border-top:1px dashed var(--border)">
    <div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Ersatz</div>
    <div class="lineup-slot ${ersatzP?(ersatzBlocked?'blocked-slot':'ok'):''}" style="opacity:.85;border-style:dashed">
      <div class="lineup-pos" style="color:var(--muted)">E</div>
      <select onchange="setSlot(${size},this.value)">${buildOpts(ersatzPid)}</select>
    </div>
    ${ersatzWarn?`<div class="warn-banner" style="margin-top:6px;font-size:11px">${ersatzWarn}</div>`:''}
  </div>`;

  document.getElementById('lineup-slots').innerHTML=slotsHtml;

  // Double-booking warnings for main lineup
  const doubleWarnings=lineup.slice(0,size).filter(Boolean).map(pid=>{
    const p=playerById(pid);if(!p)return null;
    const otherMatch=state.matches.find(om=>
      om.id!==selectedMatchId&&om.date===match.date&&
      (state.lineups[om.id]||[]).slice(0,teamSize(teamById(om.teamId))).includes(pid)
    );
    if(!otherMatch)return null;
    const otherTeam=teamById(otherMatch.teamId);
    return`⚠ ${p.name} spielt auch für <strong>${otherTeam?.name||'?'}</strong> am selben Tag`;
  }).filter(Boolean);
  if(doubleWarnings.length){
    document.getElementById('lineup-warnings').innerHTML+=
      `<div class="warn-banner" style="margin-top:6px">${doubleWarnings.map(w=>`<div>${w}</div>`).join('')}</div>`;
  }

}

async function sortLineupKap(){

function renderBlocking(){
  const cats=[...new Set(state.teams.map(t=>t.category))].sort();
  const catSel=document.getElementById('block-cat-filter');
  const defaultCat=cats.includes('Herren')?'Herren':'';
  const curCat=catSel?.value||defaultCat;
  if(catSel){catSel.innerHTML=`<option value="">Alle Kategorien</option>`+cats.map(c=>`<option value="${c}" ${curCat===c?'selected':''}>${c}</option>`).join('');catSel.value=curCat;}
  const el=document.getElementById('blocking-content');
  const filterCat=catSel?.value||'';
  const catsToShow=filterCat?[filterCat]:cats;
  let html=`<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
    <div class="rule-box" style="flex:1;margin:0"><strong>Stammkader:</strong> ${tr('ruleBoxSKBody')}</div>
    <div class="rule-box warn" style="flex:1;margin:0"><strong>Stammmannschaft:</strong> ${tr('ruleBoxSMBody')}</div>
  </div>`;
  let anyEntry=false;
  for(const cat of catsToShow){
    const catTeams=state.teams.filter(t=>t.category===cat).sort((a,b)=>teamNumber(a)-teamNumber(b));
    if(!catTeams.length)continue;
    const groupSize=teamSize(catTeams[0]);
    const catPlayers=state.players.filter(p=>p.teamIds.some(tid=>catTeams.find(t=>t.id===tid))).sort((a,b)=>(a.rank||999)-(b.rank||999));
    if(!catPlayers.length)continue;
    anyEntry=true;
    html+=`<div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--court);letter-spacing:1px;margin:14px 0 8px">${cat}</div>`;
    html+=`<div class="card" style="padding:0;overflow:hidden;overflow-x:auto;margin-bottom:10px">`;
    html+=`<table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr style="border-bottom:1px solid #2e4a42">
        <th style="padding:8px 12px;text-align:left;font-weight:600;color:var(--muted);min-width:160px">${tr('colPlayer')}</th>
        <th style="padding:8px 8px;text-align:center;font-weight:600;color:var(--muted);font-size:10px">${tr('colLK')}</th>
        <th style="padding:8px 8px;text-align:center;font-weight:600;color:var(--muted);font-size:10px">${tr('colYear')}</th>
        ${catTeams.map(t=>`<th style="padding:8px 8px;text-align:center;font-weight:600;color:var(--court);font-size:11px;white-space:nowrap">${t.name}${t.is_4er?' <span style="font-size:9px;color:var(--warn)">(4er)</span>':''}</th>`).join('')}
      </tr></thead><tbody>`;
    for(let i=0;i<catPlayers.length;i++){
      const p=catPlayers[i];
      const status=getPlayerBlockStatus(p.id,cat);
      const counts=state.matchCounts[p.id]||{};
      const skTeam=getStammkaderTeam(p.id,cat)||catTeams[catTeams.length-1];
      const cells=catTeams.map(t=>{
        const c=counts[t.id]||0;
        const isSkTeam=t.id===skTeam.id;
        const isSkBlocked=status.stammkaderBlocked.some(x=>x.id===t.id);
        const isSmBlocked=status.stammmannschaftBlocked.some(x=>x.id===t.id);
        const isSmWarned=status.stammmannschaftWarned.some(x=>x.id===t.id);
        const isAssigned=p.teamIds.includes(t.id);
        let bg='',txt='',label='',title='';
        if(isSkTeam){bg='background:#1a2d3d';txt='color:var(--info)';label='SK';title='Stammkader';}
        if(isSmBlocked&&isSkBlocked){bg='background:#3d1a1a';txt='color:var(--danger)';label=`⛔${c>0?` (${c})`:''}`;title='SK + SM';}
        else if(isSmBlocked){
          const supSum=catTeams.filter(s=>teamNumber(s)<teamNumber(t)).reduce((a,s)=>(state.matchCounts[p.id]?.[s.id]||0)+a,0);
          bg='background:#2d1a1a';txt='color:var(--danger)';label=`SM (${supSum})`;title=`${supSum}× in oberen Mannschaften`;}
        else if(isSkBlocked){bg='background:#1a1a2d';txt='color:#a78bfa';label='SK⛔';title=tr('legendSKBlock').replace('■ ','');}
        else if(isSmWarned){
          const supSum=catTeams.filter(s=>teamNumber(s)<teamNumber(t)).reduce((a,s)=>(state.matchCounts[p.id]?.[s.id]||0)+a,0);
          bg='background:#2d2215';txt='color:var(--warn)';label=`⚠ ${supSum}/2`;title=`${supSum}× in oberen Mannschaften`;}
        else if(c>0){txt='color:var(--court)';label=`${c}×`;}
        else if(isAssigned){txt='color:var(--muted)';label='—';}
        else{txt='color:#2e4a42';label='·';}
        return`<td style="padding:7px 8px;text-align:center;border-left:1px solid #2e4a4222;${bg}" title="${title}"><span style="font-size:11px;font-weight:600;${txt}">${label}</span></td>`;
      }).join('');
      const rowBg=status.blocked.length>0?'background:#1e1e1e':'';
      html+=`<tr style="border-bottom:1px solid #2e4a4222;${rowBg}">
        <td style="padding:7px 12px;white-space:nowrap"><div style="font-weight:600;font-size:12px">${p.name}</div></td>
        <td style="padding:7px 8px;text-align:center"><span class="lk-badge" style="font-size:10px">${p.lkStr||'?'}</span></td>
        <td style="padding:7px 8px;text-align:center;font-size:11px;color:var(--muted)">${p.year||'—'}</td>
        ${cells}
      </tr>`;
    }
    html+=`</tbody></table>
      <div style="padding:8px 12px;display:flex;gap:10px;flex-wrap:wrap;border-top:1px solid #2e4a42">
        <span style="font-size:10px;color:var(--info)">${tr('legendSK')}</span>
        <span style="font-size:10px;color:#a78bfa">${tr('legendSKBlock')}</span>
        <span style="font-size:10px;color:var(--danger)">${tr('legendSMBlock')}</span>
        <span style="font-size:10px;color:var(--warn)">${tr('legendWarn')}</span>
        <span style="font-size:10px;color:var(--court)">${tr('legendCount')}</span>
      </div></div>`;
  }
  if(!anyEntry)html+=`<div class="empty">${tr('noBlocked')}</div>`;
  el.innerHTML=html;
}

async function runAutoLineup(){
  const match=state.matches.find(m=>m.id===selectedMatchId);if(!match)return;
  const team=teamById(match.teamId);
  const size=teamSize(team);
  const avail=state.availability[selectedMatchId]||{};
  const available=[...state.players.filter(p=>
    p.teamIds.includes(match.teamId)&&
    avail[p.id]==='yes'&&
    !isPlayerBlockedForLineup(p.id,match.teamId)
  )].sort((a,b)=>playerRankInTeam(a.id,match.teamId)-playerRankInTeam(b.id,match.teamId));
  const slots=Array.from({length:size},(_,i)=>available[i]?.id||null);
  state.lineups[selectedMatchId]=slots;
  document.getElementById('save-indicator').innerHTML='<span class="spinner"></span>Speichern...';
  try{
    await sbUpsert('lineups',[{match_id:selectedMatchId,slots}]);
    document.getElementById('save-indicator').textContent='✓ Auto-Aufstellung gespeichert';
    setTimeout(()=>document.getElementById('save-indicator').textContent='',2500);
  }catch(e){
    document.getElementById('save-indicator').textContent='Fehler beim Speichern';
    console.error(e);
  }
  renderLineupSlots();
  renderTeamContent();
}

function _kapOvSortTeams(teams){
  const ts=[...teams];
  if(_kapOvSort==='altersklasse'){
    return ts.sort((a,b)=>{
      if(a.category!==b.category)return a.category.localeCompare(b.category);
      return teamNumber(a)-teamNumber(b);
    });
  }
  // 'number': sort by team number first, then by category
  return ts.sort((a,b)=>{
    const na=teamNumber(a),nb=teamNumber(b);
    if(na!==nb)return na-nb;
    return a.category.localeCompare(b.category);
  });
}

function _buildPanelContent(panel){
  const cats=[...new Set(state.teams.map(t=>t.category))].sort();
  panel.innerHTML='';
  const allSelected=!_kapOvSelectedCats;
  ['__all__',...cats].forEach(function(c){
    const isAll=c==='__all__';
    const lbl=document.createElement('label');
    lbl.style.cssText='display:flex;align-items:center;gap:6px;padding:5px 10px;cursor:pointer;font-size:12px;border-radius:6px;white-space:nowrap;color:'+(isAll?'#fff':'#aaa')+';font-weight:'+(isAll?'600':'400');
    lbl.addEventListener('mouseover',function(){lbl.style.background='#222';});
    lbl.addEventListener('mouseout',function(){lbl.style.background='transparent';});
    const cb=document.createElement('input');
    cb.type='checkbox';
    cb.style.cssText='accent-color:#52b788;flex-shrink:0;margin:0;width:14px;height:14px';
    cb.checked=isAll?allSelected:(allSelected||!!(_kapOvSelectedCats&&_kapOvSelectedCats.includes(c)));
    if(isAll)cb.id='_mc_all';
    else cb.dataset.cat=c;
    cb.addEventListener('change',function(){
      if(isAll){
        _kapOvSelectedCats=cb.checked?null:[];
      } else {
        const checked=[..._kapOvPanelEl.querySelectorAll('input[data-cat]:checked')].map(function(i){return i.dataset.cat;});
        _kapOvSelectedCats=checked.length===cats.length?null:checked;
        const allCb=_kapOvPanelEl.querySelector('#_mc_all');
        if(allCb)allCb.checked=!_kapOvSelectedCats;
      }
      _updateMultiCatLabel();
      _buildPanelContent(panel);
      renderKapOverview();
    });
    const span=document.createElement('span');
    span.textContent=isAll?(lang==='de'?'Alle':lang==='es'?'Todas':'All'):c;
    lbl.appendChild(cb);
    lbl.appendChild(span);
    panel.appendChild(lbl);
    if(isAll){
      const div=document.createElement('div');
      div.style.cssText='border-top:1px solid #333;margin:3px 6px';
      panel.appendChild(div);
    }
  });
}

function _updateMultiCatLabel(){
  const lbl=document.getElementById('kap-ov-multicat-label');
  if(!lbl)return;
  if(!_kapOvSelectedCats)lbl.textContent=lang==='de'?'Alle Kategorien':lang==='es'?'Todas las categorías':'All categories';
  else if(!_kapOvSelectedCats.length)lbl.textContent=lang==='de'?'Keine':lang==='es'?'Ninguna':'None';
  else lbl.textContent=_kapOvSelectedCats.join(', ');
}

function updateMultiCatLabel(){_updateMultiCatLabel();}
function buildMultiCatList(){
  _kapOvSelectedCats=null;
  if(_kapOvPanelEl){_kapOvPanelEl.remove();_kapOvPanelEl=null;}
  _updateMultiCatLabel();
}
function onMultiSelectChange(){}
function onMultiCatAll(){}
function onMultiCatChange(){}

function setKapOverviewMode(mode){
  _kapOvMode=mode;
  const bm=document.getElementById('kap-ov-btn-matches');
  const bp=document.getElementById('kap-ov-btn-players');
  if(bm){bm.style.background=mode==='matches'?'var(--court)':'transparent';bm.style.color=mode==='matches'?'#0d1a10':'var(--muted)';bm.style.borderColor=mode==='matches'?'var(--court)':'var(--border2)';}
  if(bp){bp.style.background=mode==='players'?'var(--court)':'transparent';bp.style.color=mode==='players'?'#0d1a10':'var(--muted)';bp.style.borderColor=mode==='players'?'var(--court)':'var(--border2)';}
  renderKapOverview();
}

function renderKapOverview(){
  if(_kapOvMode==='matches'){
    renderKapOverviewMatches(_kapOvSelectedCats);
    return;
  }

  // ── SPIELER MODE ──
  const el=document.getElementById('kap-overview-content');
  const selected=_kapOvSelectedCats;

  function renderPlayersTable(teams,players,matches){
    if(!matches.length)return'';
    const dates=[...new Set(matches.map(m=>m.date))].sort();
    function shortName(t){
      if(!t)return'?';
      return t.name.replace('Herren','H').replace('Damen','D').replace('Senioren','Sen').replace('Seniorinnen','SenF').trim();
    }
    let html=`<table style="border-collapse:collapse;font-size:12px;min-width:100%;margin-bottom:24px">
      <thead><tr style="border-bottom:1px solid var(--border2)">
        <th style="padding:8px 12px;text-align:left;font-weight:600;color:var(--muted);white-space:nowrap;min-width:160px">${tr('colPlayer')}</th>
        <th style="padding:8px 8px;text-align:center;font-weight:600;color:var(--muted);font-size:10px">${tr('colLK')}</th>
        ${dates.map(d=>`<th style="padding:8px 10px;text-align:center;font-weight:600;color:var(--muted);white-space:nowrap">${fmtDate(d)}</th>`).join('')}
      </tr></thead><tbody>`;
    for(const p of players){
      const smTeams=teams.filter(t=>state.mainTeam[p.id]?.[t.id]);
      const smLabel=smTeams.length?smTeams.map(t=>t.name).join(', '):null;
      html+=`<tr style="border-bottom:1px solid var(--border)22">
        <td style="padding:7px 12px;white-space:nowrap">
          <span style="font-weight:600">${p.name}</span>
          ${smLabel?`<span style="font-size:9px;color:#d4a017;margin-left:4px">★ ${smLabel}</span>`:''}
        </td>
        <td style="padding:7px 8px;text-align:center"><span class="lk-badge" style="font-size:10px">${p.lkStr||'?'}</span></td>`;
      for(const d of dates){
        const dayMatches=matches.filter(m=>m.date===d&&p.teamIds.includes(m.teamId)).sort((a,b)=>teamNumber(teamById(a.teamId)||{})-teamNumber(teamById(b.teamId)||{}));
        if(!dayMatches.length){html+=`<td style="padding:7px 10px;text-align:center;color:var(--border2)">—</td>`;continue;}
        let cellHtml='<td style="padding:4px 6px;text-align:center;min-width:80px"><div style="display:flex;flex-direction:column;gap:3px">';
        for(const m of dayMatches){
          const team=teamById(m.teamId);
          const sz=teamSize(team);
          const slots=state.lineups[m.id]||[];
          const inLineup=slots.slice(0,sz).includes(p.id);
          const isErsatz=slots[sz]===p.id;
          const avail=state.availability[m.id]?.[p.id]||'';
          const sn=shortName(team);
          let bg,col,icon,sublabel;
          if(inLineup){bg='#1a2e26';col='var(--court)';icon='✓';sublabel=sn;}
          else if(isErsatz){bg='#252525';col='var(--muted)';icon='E';sublabel=sn;}
          else if(avail==='yes'){bg='#1a2a1a';col='#52c97a';icon=tr('overviewIconYes');sublabel=sn;}
          else if(avail==='conditional'){bg='rgba(82,201,122,.08)';col='#52c97a';icon='('+tr('overviewIconYes')+')';sublabel=sn;}
          else if(avail==='notfall'){bg='#2e2a1a';col='var(--warn)';icon=tr('overviewIconNotfall');sublabel=sn;}
          else if(avail==='no'){bg='#2d1a1a';col='var(--danger)';icon='✗';sublabel=sn;}
          else{bg='transparent';col='#444';icon='?';sublabel=sn;}
          cellHtml+=`<div style="background:${bg};border-radius:6px;padding:3px 8px;font-size:10px;font-weight:600;color:${col};white-space:nowrap;display:flex;align-items:center;justify-content:space-between;gap:6px">
            <span style="opacity:.7;font-size:9px;font-weight:500">${sublabel}</span>
            <span>${icon}</span>
          </div>`;
        }
        cellHtml+='</div></td>';
        html+=cellHtml;
      }
      html+='</tr>';
    }
    html+='</tbody></table>';
    return html;
  }

  const ll=tr('legendLabels');
  const legendColors=['var(--court)','var(--muted)','#52c97a','var(--warn)','var(--danger)','#d4a017'];
  const legend=`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;padding:8px 12px;background:#181818;border-radius:8px;font-size:11px">
    ${ll.map((l,i)=>`<span style="color:${legendColors[i]}">■ ${l}</span>`).join('')}
  </div>`;

  // Single table with filtered categories
  const teams=_kapOvSortTeams(!selected||!selected.length?state.teams:state.teams.filter(t=>selected.includes(t.category)));
  const matches=state.matches.filter(m=>teams.find(t=>t.id===m.teamId)).sort((a,b)=>a.date.localeCompare(b.date));
  const players=[...state.players.filter(p=>p.teamIds.some(tid=>teams.find(t=>t.id===tid)))].sort((a,b)=>(a.rank||999)-(b.rank||999));
  if(!matches.length){el.innerHTML=legend+'<div class="empty">Keine Spiele</div>';return;}
  el.innerHTML=legend+renderPlayersTable(teams,players,matches);
}

function goToMatchKap(matchId){
  const m=state.matches.find(x=>x.id===matchId);if(!m)return;
  showKapTab('spiele');
  selectTeam(m.teamId);
  selectMatch(matchId);
  document.getElementById('avail-panel').scrollIntoView({behavior:'smooth',block:'start'});
}

function renderKapOverviewMatches(selectedCats){
  const el=document.getElementById('kap-overview-content');
  const teams=_kapOvSortTeams((!selectedCats||selectedCats.length===0)?state.teams:state.teams.filter(t=>selectedCats.includes(t.category)));
  const matches=state.matches.filter(m=>teams.find(t=>t.id===m.teamId)).sort((a,b)=>a.date.localeCompare(b.date));
  if(!matches.length){el.innerHTML='<div class="empty">Keine Spiele</div>';return;}
  const dates=[...new Set(matches.map(m=>m.date))].sort();
  const allCatPlayers=state.players.filter(p=>p.teamIds.some(tid=>teams.find(t=>t.id===tid)));
  function getFirstName(p){
    if(!p)return'—';
    const rn=p.rawName||p.raw_name||p.name;
    if(rn.includes(','))return rn.split(',')[1].trim().split(' ')[0];
    return p.name.trim().split(' ')[0];
  }
  function getLastInitials(p){
    if(!p)return'';
    const rn=p.rawName||p.raw_name||p.name;
    const surname=rn.includes(',')?rn.split(',')[0].trim():p.name.trim().split(' ').slice(1).join(' ');
    return surname.split(/[ -]+/).map(w=>w[0]).join('.')+'.';
  }
  const catFirstNameCounts={};
  for(const cp of allCatPlayers){const fn=getFirstName(cp);catFirstNameCounts[fn]=(catFirstNameCounts[fn]||0)+1;}
  function shortPN(p){
    if(!p)return'—';
    const fn=getFirstName(p);
    if(catFirstNameCounts[fn]>1)return`${fn} ${getLastInitials(p)}`;
    return fn;
  }

  let html=`<table style="border-collapse:collapse;font-size:12px;min-width:100%">
    <thead><tr style="border-bottom:1px solid var(--border2)">
      <th style="padding:8px 12px;text-align:left;font-weight:600;color:var(--muted);white-space:nowrap;min-width:100px">Team</th>
      ${dates.map(d=>`<th style="padding:8px 10px;text-align:center;font-weight:600;color:var(--muted);white-space:nowrap">${fmtDate(d)}</th>`).join('')}
    </tr></thead><tbody>`;

  for(const team of teams){
    html+=`<tr style="border-top:2px solid var(--border2)">
      <td style="padding:8px 12px;font-weight:600;color:var(--court);white-space:nowrap;vertical-align:top">${team.name}</td>`;
    for(const d of dates){
      const m=matches.find(x=>x.teamId===team.id&&x.date===d);
      if(!m){html+=`<td style="padding:8px 10px;text-align:center;color:var(--border2);vertical-align:top">—</td>`;continue;}
      const sz=teamSize(team);
      const slots=state.lineups[m.id]||[];
      const mainSlots=slots.slice(0,sz);
      const filled=mainSlots.filter(Boolean).length;
      const complete=filled>=sz;
      const partial=filled>0&&!complete;
      const bg=complete?'#1a2e26':partial?'#2d2215':'#1a1a1a';
      const col=complete?'var(--court)':partial?'var(--warn)':'var(--muted)';
      const icon=complete?'✓':partial?'⏳':'·';
      const ersatzPid=slots[sz]||null;
      let playersHtml='';
      for(let i=0;i<sz;i++){
        const pid=mainSlots[i];
        const p=pid?playerById(pid):null;
        playersHtml+=`<div style="font-size:10px;padding:1px 0;color:${p?'var(--white)':'#2e4a42'};display:flex;gap:4px;align-items:center">
          <span style="color:var(--muted);min-width:12px;font-size:9px">${i+1}.</span>
          <span title="${p?p.name:''}">${shortPN(p)}</span>
        </div>`;
      }
      if(ersatzPid){
        const ep=playerById(ersatzPid);
        if(ep)playersHtml+=`<div style="font-size:10px;padding:2px 0;border-top:1px dashed var(--border2);margin-top:2px;color:var(--muted);display:flex;gap:4px;align-items:center">
          <span style="color:#444;min-width:12px;font-size:9px">E.</span>
          <span title="${ep.name}">${shortPN(ep)}</span>
        </div>`;
      }
      html+=`<td style="padding:6px 8px;vertical-align:top">
        <div onclick="goToMatchKap('${m.id}')" style="cursor:pointer;background:${bg};border-radius:8px;padding:6px 8px;min-width:100px">
          <div style="font-size:11px;font-weight:600;color:${col};margin-bottom:4px">${icon} ${(m.opponent||'').substring(0,12)}</div>
          <div style="font-size:10px;color:var(--muted);margin-bottom:5px">${m.time} · ${m.home==='Heim'?'H':'A'} · ${filled}/${sz}</div>
          <div style="border-top:1px solid var(--border2);padding-top:4px">${playersHtml}</div>
        </div>
      </td>`;
    }
    html+='</tr>';
  }

  // ── NICHT AUFGESTELLT row ──
  const naLabel=lang==='de'?'Nicht aufgestellt':lang==='es'?'No alineados':'Not in lineup';
  html+=`<tr style="border-top:2px solid var(--border2);background:#0f0f0f">
    <td style="padding:8px 12px;font-weight:600;color:var(--muted);white-space:nowrap;vertical-align:top;font-size:11px;text-transform:uppercase;letter-spacing:.5px">${naLabel}</td>`;
  for(const d of dates){
    const dayMatches=matches.filter(x=>x.date===d);
    if(!dayMatches.length){html+=`<td style="padding:8px 10px;text-align:center;color:var(--border2);vertical-align:top">—</td>`;continue;}
    // Build set of player IDs in lineup or Ersatz across all matches that day
    const inLineupAcrossDay=new Set();
    for(const dm of dayMatches){
      const dmTeam=teamById(dm.teamId);
      const dmSz=teamSize(dmTeam);
      const dmSlots=state.lineups[dm.id]||[];
      dmSlots.slice(0,dmSz).filter(Boolean).forEach(pid=>inLineupAcrossDay.add(pid));
      if(dmSlots[dmSz])inLineupAcrossDay.add(dmSlots[dmSz]);
    }
    // Collect available players from all teams playing this day, deduplicated by player id
    const availMap=new Map(); // pid -> {p, a (best status)}
    const ord={yes:0,conditional:1,notfall:2};
    for(const dm of dayMatches){
      const dmTeamPlayers=state.players.filter(p=>p.teamIds.includes(dm.teamId));
      for(const p of dmTeamPlayers){
        if(inLineupAcrossDay.has(p.id))continue;
        const a=state.availability[dm.id]?.[p.id]||'';
        if(a!=='yes'&&a!=='conditional'&&a!=='notfall')continue;
        const existing=availMap.get(p.id);
        if(!existing||ord[a]<ord[existing.a])availMap.set(p.id,{p,a});
      }
    }
    if(!availMap.size){html+=`<td style="padding:8px 10px;text-align:center;color:var(--border2);vertical-align:top">—</td>`;continue;}
    const sorted=[...availMap.values()].sort((x,y)=>{
      if(ord[x.a]!==ord[y.a])return ord[x.a]-ord[y.a];
      return (x.p.rank||999)-(y.p.rank||999);
    });
    let cellHtml='<td style="padding:6px 8px;vertical-align:top">';
    for(const x of sorted){
      const c=x.a==='yes'?'#52c97a':x.a==='conditional'?'rgba(82,201,122,.7)':'var(--warn)';
      const mark=x.a==='yes'?'✓':x.a==='conditional'?'(✓)':'!';
      cellHtml+=`<div style="font-size:10px;padding:1px 0;color:${c};display:flex;gap:4px;align-items:center;white-space:nowrap">
        <span style="min-width:14px;font-size:9px;opacity:.8">${mark}</span>
        <span title="${x.p.name}">${shortPN(x.p)}</span>
      </div>`;
    }
    cellHtml+='</td>';
    html+=cellHtml;
  }
  html+='</tr>';

  html+='</tbody></table>';
  html+=`<div style="margin-top:10px;display:flex;gap:12px;font-size:11px;flex-wrap:wrap">
    <span style="color:var(--court)">■ Vollständig</span>
    <span style="color:var(--warn)">■ Teilweise</span>
    <span style="color:var(--muted)">■ Offen</span>
  </div>`;
  el.innerHTML=html;
}
</script>
